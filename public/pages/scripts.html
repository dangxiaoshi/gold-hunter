<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>话术库 — 金币猎人 2.0</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #141414; color: #d0d0d0; font-family: system-ui, -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

    /* ── 顶栏 ── */
    #topbar { height: 40px; background: #181818; border-bottom: 1px solid #242424; display: flex; align-items: center; padding: 0 14px; gap: 12px; flex-shrink: 0; }
    #topbar .title { font-size: 13px; font-weight: 600; color: #d0d0d0; }
    #topbar .search { flex: 1; max-width: 280px; background: #222; border: 1px solid #2a2a2a; border-radius: 5px; padding: 4px 10px; font-size: 12px; color: #d0d0d0; outline: none; }
    #topbar .search::placeholder { color: #484848; }
    #topbar .search:focus { border-color: #3a3a3a; }
    #topbar .add-btn { margin-left: auto; background: #f0a500; border: none; color: #7a4f00; font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
    #topbar .add-btn:hover { background: #ffb820; }

    /* ── 三栏 ── */
    #layout { display: flex; flex: 1; overflow: hidden; }

    /* ── 左栏：产品树 ── */
    #left-col { width: 190px; flex-shrink: 0; background: #1c1c1c; border-right: 1px solid #252525; overflow-y: auto; }
    #left-col::-webkit-scrollbar { width: 4px; } #left-col::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .section-label { font-size: 10px; color: #404040; letter-spacing: 1px; padding: 12px 14px 6px; }

    .product-item { cursor: pointer; }
    .product-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; font-size: 12px; color: #707070; transition: background 0.15s; user-select: none; }
    .product-header:hover { background: #202020; }
    .product-header.active { color: #d0d0d0; }
    .product-header .icon { font-size: 13px; flex-shrink: 0; }
    .product-header .name { flex: 1; }
    .product-header .chevron { font-size: 9px; color: #404040; transition: transform 0.2s; }
    .product-header.open .chevron { transform: rotate(90deg); }
    .product-header .total { font-size: 10px; color: #404040; }

    .stage-list { display: none; }
    .stage-list.open { display: block; }
    .stage-item { display: flex; align-items: center; padding: 6px 12px 6px 32px; font-size: 11px; color: #585858; cursor: pointer; transition: background 0.15s; }
    .stage-item:hover { background: #1e1e1e; color: #909090; }
    .stage-item.active { background: #1e1e1e; color: #d8d8d8; position: relative; }
    .stage-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #f0a500; }
    .stage-item .s-icon { margin-right: 6px; }
    .stage-item .s-name { flex: 1; }
    .stage-item .s-count { font-size: 10px; color: #f0a500; }
    .stage-item.active .s-count { color: #f0a500; }

    /* ── 中栏：话术列表 ── */
    #mid-col { flex: 1; min-width: 0; overflow-y: auto; padding: 0; background: #141414; }
    #mid-col::-webkit-scrollbar { width: 4px; } #mid-col::-webkit-scrollbar-thumb { background: #2a2a2a; }

    .mid-header { height: 36px; background: #181818; border-bottom: 1px solid #222; display: flex; align-items: center; padding: 0 14px; font-size: 13px; color: #d0d0d0; font-weight: 500; flex-shrink: 0; position: sticky; top: 0; z-index: 10; }
    .mid-header .h-label { flex: 1; }
    .mid-header .h-add { font-size: 11px; color: #f0a500; cursor: pointer; }
    .mid-header .h-add:hover { color: #ffb820; }

    .script-cards { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

    .script-card { background: #191919; border: 1px solid #252525; border-radius: 6px; padding: 12px 14px; cursor: default; transition: border-color 0.15s; }
    .script-card:hover { border-color: #303030; }
    .script-card.selected { border-color: #f0a500; background: #1e1e1e; }

    .card-tags { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
    .tag { font-size: 9px; padding: 2px 7px; border-radius: 3px; background: #242424; color: #606060; }
    .tag.stage-tag { background: #1e1800; color: #f0a500; }
    .tag.product-tag { background: #242424; color: #606060; }

    .card-content { font-size: 12px; color: #c0c0c0; line-height: 1.6; white-space: pre-wrap; word-break: break-all; max-height: 120px; overflow: hidden; }
    .card-content.expanded { max-height: none; }
    .card-expand { font-size: 10px; color: #404040; cursor: pointer; margin-top: 4px; }
    .card-expand:hover { color: #606060; }

    .card-footer { display: flex; align-items: center; margin-top: 10px; gap: 8px; }
    .card-stats { font-size: 10px; color: #484848; flex: 1; }
    .card-stats span { margin-right: 12px; }
    .btn-edit { font-size: 10px; background: #222; border: none; color: #606060; padding: 4px 10px; border-radius: 4px; cursor: pointer; }
    .btn-edit:hover { background: #2a2a2a; color: #909090; }
    .btn-shoot { font-size: 10px; background: #f0a500; border: none; color: #7a4f00; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-weight: 600; }
    .btn-shoot:hover { background: #ffb820; }
    .btn-delete { font-size: 10px; background: none; border: none; color: #404040; padding: 4px 6px; cursor: pointer; }
    .btn-delete:hover { color: #e05050; }

    .empty-state { padding: 40px 20px; text-align: center; color: #404040; font-size: 13px; }
    .empty-state .e-icon { font-size: 28px; margin-bottom: 8px; }
    .empty-state .e-btn { display: inline-block; margin-top: 12px; background: #1e1e1e; border: 1px dashed #2a2a2a; color: #505050; font-size: 12px; padding: 7px 16px; border-radius: 5px; cursor: pointer; }
    .empty-state .e-btn:hover { border-color: #404040; color: #707070; }

    /* ── 右栏：AI推荐 ── */
    #right-col { width: 360px; flex-shrink: 0; background: #0d0d0d; border-left: 1px solid #1e1e1e; overflow-y: auto; display: flex; flex-direction: column; }
    #right-col::-webkit-scrollbar { width: 4px; } #right-col::-webkit-scrollbar-thumb { background: #222; }

    .right-header { padding: 10px 14px 8px; background: #111; border-bottom: 1px solid #1a1a1a; font-size: 11px; color: #404040; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
    .right-header .rh-title { flex: 1; }
    .right-header .rh-hint { font-size: 10px; color: #303030; }

    .right-context { padding: 10px 14px; border-bottom: 1px solid #1a1a1a; font-size: 11px; color: #484848; font-family: monospace; }
    .right-context .ctx-line { margin-bottom: 4px; }
    .right-context .ctx-stage { color: #f0a500; }

    .right-section { padding: 12px 14px 6px; font-size: 11px; color: #f0a500; font-family: monospace; }

    .rec-card { margin: 6px 14px; background: #141414; border: 1px solid #222; border-radius: 5px; padding: 10px 12px; }
    .rec-card.best { background: #191600; border-color: #f0a500; }
    .rec-card .rc-meta { font-size: 10px; color: #505050; margin-bottom: 6px; }
    .rec-card.best .rc-meta { color: #f0a500; }
    .rec-card .rc-content { font-size: 11px; color: #707070; line-height: 1.5; }
    .rec-card.best .rc-content { color: #c0c0c0; }
    .rec-card .rc-actions { display: flex; justify-content: flex-end; margin-top: 8px; }
    .rc-use-btn { font-size: 10px; background: #1e1e1e; border: none; color: #505050; padding: 3px 10px; border-radius: 3px; cursor: pointer; }
    .rec-card.best .rc-use-btn { background: #f0a500; color: #7a4f00; font-weight: 600; }
    .rc-use-btn:hover { opacity: 0.8; }

    .stats-block { margin: 12px 14px; padding: 12px; background: #111; border-radius: 5px; border: 1px solid #1e1e1e; }
    .stats-row { display: flex; justify-content: space-between; align-items: center; padding: 3px 0; font-family: monospace; font-size: 11px; }
    .stats-row .sk { color: #484848; }
    .stats-row .sv { color: #d0d0d0; }
    .stats-row .sv.gold { color: #f0a500; }

    .add-custom { margin: 12px 14px; }
    .add-custom .ac-label { font-size: 10px; color: #383838; margin-bottom: 6px; font-family: monospace; }
    .add-custom textarea { width: 100%; background: #111; border: 1px solid #222; border-radius: 5px; color: #606060; font-size: 11px; padding: 8px 10px; resize: none; outline: none; font-family: system-ui; }
    .add-custom textarea:focus { border-color: #2a2a2a; }
    .add-custom .ac-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
    .ac-save-btn { font-size: 10px; background: #1e1e1e; border: none; color: #505050; padding: 4px 12px; border-radius: 3px; cursor: pointer; }
    .ac-save-btn:hover { background: #252525; color: #707070; }

    /* ── 模态框 ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 8px; width: 520px; max-width: 95vw; max-height: 85vh; overflow-y: auto; }
    .modal-header { padding: 16px 18px 12px; border-bottom: 1px solid #252525; display: flex; align-items: center; }
    .modal-header h3 { font-size: 14px; font-weight: 600; color: #d0d0d0; flex: 1; }
    .modal-close { background: none; border: none; color: #484848; font-size: 18px; cursor: pointer; line-height: 1; }
    .modal-close:hover { color: #909090; }
    .modal-body { padding: 16px 18px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 11px; color: #606060; margin-bottom: 5px; }
    .form-group select, .form-group input, .form-group textarea { width: 100%; background: #181818; border: 1px solid #2a2a2a; border-radius: 5px; color: #d0d0d0; font-size: 13px; padding: 7px 10px; outline: none; font-family: system-ui; }
    .form-group select:focus, .form-group input:focus, .form-group textarea:focus { border-color: #f0a500; }
    .form-group textarea { resize: vertical; min-height: 160px; line-height: 1.6; }
    .modal-footer { padding: 12px 18px 16px; border-top: 1px solid #252525; display: flex; justify-content: flex-end; gap: 8px; }
    .btn-cancel { background: #222; border: none; color: #606060; font-size: 13px; padding: 7px 16px; border-radius: 5px; cursor: pointer; }
    .btn-cancel:hover { background: #2a2a2a; }
    .btn-save { background: #f0a500; border: none; color: #7a4f00; font-size: 13px; font-weight: 600; padding: 7px 18px; border-radius: 5px; cursor: pointer; }
    .btn-save:hover { background: #ffb820; }

    .copied-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #f0a500; color: #7a4f00; font-size: 12px; font-weight: 600; padding: 7px 16px; border-radius: 5px; z-index: 200; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
    .copied-toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- 顶栏 -->
<div id="topbar">
  <span class="title">📝 话术库</span>
  <input type="text" class="search" id="searchInput" placeholder="🔍 搜索话术内容...">
  <button class="add-btn" onclick="openModal()">＋ 添加话术</button>
</div>

<!-- 三栏布局 -->
<div id="layout">

  <!-- 左栏：产品树 -->
  <div id="left-col">
    <div class="section-label">产品分类</div>
    <div id="product-tree"></div>
  </div>

  <!-- 中栏：话术列表 -->
  <div id="mid-col">
    <div class="mid-header">
      <span class="h-label" id="midLabel">全部话术</span>
      <span class="h-add" onclick="openModal()">＋ 添加</span>
    </div>
    <div class="script-cards" id="scriptCards"></div>
  </div>

  <!-- 右栏：AI推荐 -->
  <div id="right-col">
    <div class="right-header">
      <span class="rh-title">⚡ AI 推荐</span>
      <span class="rh-hint" id="matchHint">按当前客户匹配</span>
    </div>
    <div class="right-context" id="rightContext">
      <div class="ctx-line">当前客户：<span id="ctxCustomer">—</span></div>
      <div class="ctx-line">产品：<span id="ctxProduct">—</span> &nbsp; 阶段：<span class="ctx-stage" id="ctxStage">—</span></div>
    </div>
    <div class="right-section">▶ 最匹配话术</div>
    <div id="recCards"></div>
    <div class="right-section" style="margin-top:4px;">▶ 本月战绩</div>
    <div class="stats-block">
      <div class="stats-row"><span class="sk">话术使用总次数</span><span class="sv" id="statTotal">0 次</span></div>
      <div class="stats-row"><span class="sk">平均成交率</span><span class="sv gold" id="statRate">—</span></div>
      <div class="stats-row"><span class="sk">最有效话术</span><span class="sv" id="statBest" style="font-size:10px;text-align:right;max-width:160px;">—</span></div>
    </div>
    <div class="add-custom">
      <div class="ac-label">＋ 快速收录有效话术</div>
      <textarea id="quickAdd" rows="3" placeholder="输入你自己总结的有效话术，选好产品和阶段后保存..."></textarea>
      <div class="ac-actions"><button class="ac-save-btn" onclick="quickSave()">💾 保存到当前分类</button></div>
    </div>
  </div>

</div>

<!-- 模态框：添加/编辑 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">添加话术</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>产品</label>
        <select id="fProduct"></select>
      </div>
      <div class="form-group">
        <label>阶段</label>
        <select id="fStage"></select>
      </div>
      <div class="form-group">
        <label>场景备注（可选）</label>
        <input type="text" id="fLabel" placeholder="如：价格顾虑·时间拆分法">
      </div>
      <div class="form-group">
        <label>话术内容</label>
        <textarea id="fContent" placeholder="输入话术文本，支持多行。可以是一段完整的对话，也可以是简短的一句话。"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveScript()">保存</button>
    </div>
  </div>
</div>

<div class="copied-toast" id="copiedToast">已复制 🏹</div>

<script>
// ── 常量 ──
const PRODUCTS = ['播客私教', '播客剪辑营', '年度社群', '私密咨询'];
const PRODUCT_ICONS = { '播客私教': '🎙️', '播客剪辑营': '✂️', '年度社群': '👥', '私密咨询': '🔐' };
const STAGES = ['建立连接', '挖掘需求', '解决顾虑', '最后成交'];
const STAGE_ICONS = { '建立连接': '🤝', '挖掘需求': '🔍', '解决顾虑': '🛡️', '最后成交': '💰' };
const STORAGE_KEY = 'gh_scripts_v5';

// ── 状态 ──
let data = loadData();
let selectedProduct = null;
let selectedStage = null;
let editingId = null;
let searchQuery = '';

// ── 数据 ──
function loadData() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return { scripts: getDefaultScripts() };
}

function saveData() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getDefaultScripts() {
  return [
    { id: 1001, product: '播客私教', stage: '建立连接', label: '你目前有布局自己播客的想法吗？', content: '你目前有布局自己播客的想法吗？\n\n或者你目前已经对做播客有了什么设计和想法，咱们也可以聊一聊哈。\n\n你目前有想布局自己的播客吗？\n\n你有布局播客的打算吗？\n\n咱们目前想要做一个自己的播客账号吗？\n\n咱们目前有做播客的想法嘛？可以和我聊一聊呀\n\n我们目前想要自己开一档命理方向能赚钱的播客吗？\n\n咱们想了解一下我们的播客私教服务呀？', useCount: 0, rate: 0 },
    { id: 1002, product: '播客私教', stage: '建立连接', label: '介绍之前我想多了解一下咱们的情况，我…', content: '介绍之前我想多了解一下咱们的情况，我们目前有没有自己在做的业务和产品呀？咱们做播客就是为了借用播客的这个渠道，来实现变现，或者放大我们现在业务的收益，这个咱们认同吗？\n\n咱们目前做的是哪些具体的业务，可以和我再说一说吗？\n\n咱们现在有自己的产品吗？我来给咱们梳理一下。5、6万的粉丝按理来说，变现怎么都应该在6位数以上了\n\n嘉晨老师和我简单说了一下咱们的情况，咱们目前做的是哪些具体的业务，可以和我再说一说吗？\n\n咱们目前的业务盘子做的应该挺不错的，如果还想进一步放大，现在布局播客是一个好时候，大佬肯定懂，我就不多说了哈哈哈！\n\n咱们目前做的是什么业务呀，有自己的产品不，是想用播客引流进私域做成交对不？', useCount: 0, rate: 0 },
    { id: 1003, product: '播客私教', stage: '建立连接', label: '我们之前有做过什么搞钱项目吗？自己目…', content: '我们之前有做过什么搞钱项目吗？自己目前有没有想开一档赚钱的播客？有没有什么想法\n\n咱们业务发展到哪一步啦？是想自己做一档播客不？', useCount: 0, rate: 0 },
    { id: 1004, product: '播客私教', stage: '建立连接', label: '如果要讲本地历史内容的话，你有相应的…', content: '如果要讲本地历史内容的话，你有相应的业务对接吗？如果是单纯的做播客，但是不变现的话，是很难坚持下去的。你看看要不要我给你介绍一下我的私教服务，看看怎么能够更好的帮你梳理，做一档适合你的能搞钱变现的播客呀[机智]', useCount: 0, rate: 0 },
    { id: 1005, product: '播客私教', stage: '挖掘需求', label: '你看看要不要了解一下我的私教陪跑服务…', content: '你看看要不要了解一下我的私教陪跑服务，或者可以先约我一次咨询，我来给咱们做一次深度梳理，但这些服务都是需要付费的，我相信咨询完之后，你在播客搞钱这块收获会非常大，你看你想了解一下吗？', useCount: 0, rate: 0 },
    { id: 1006, product: '播客私教', stage: '挖掘需求', label: '咱们的基础已经很好啦，在专业和技术方…', content: '咱们的基础已经很好啦，在专业和技术方面我们完全没有问题，现在就是，怎么能把我们的专业技术，包装成产品或者服务卖出去，真正变现成真金白银揣进我们的口袋，对不对？那播客就能很好的实现这一点。', useCount: 0, rate: 0 },
    { id: 1007, product: '播客私教', stage: '挖掘需求', label: '你现在已经完全意识到播客是一条很好的…', content: '你现在已经完全意识到播客是一条很好的红利赛道了，这是一个特别好的开始，接下来就是梳理要如何做内容，如何定位，如何用播客这条渠道赚到钱。', useCount: 0, rate: 0 },
    { id: 1008, product: '播客私教', stage: '挖掘需求', label: '太棒了宝有这样的学习动力，你做什么都…', content: '太棒了宝有这样的学习动力，你做什么都会成功的！跟上我们剪辑营的节奏，以后想要做自己的播客也没问题，我的播客私教当中就有很多是剪辑营补差价小伙伴，他们又突破了剪辑的这个卡点，又有我手把手带着做，进度都会比其他人快很多！', useCount: 0, rate: 0 },
    { id: 1009, product: '播客私教', stage: '建立连接', label: '我给你介绍一下我的私教会怎么帮你搞定…', content: '我给你介绍一下我的私教会怎么帮你搞定这些问题好吗', useCount: 0, rate: 0 },

    { id: 1013, product: '播客私教', stage: '建立连接', label: '宝我看到咱们昨天有咨询播客私教，是对…', content: '宝我看到咱们昨天有咨询播客私教，是对权益有疑问嘛，我来给咱们介绍一下？咱们的总结特别棒呀[强]你看看想了解一下我的私教权益不？我可以给咱们介绍一下', useCount: 0, rate: 0 },
    { id: 1014, product: '播客私教', stage: '建立连接', label: '刚才已经听嘉晨老师说啦！她和我说咱们…', content: '刚才已经听嘉晨老师说啦！她和我说咱们的执行力和学习能力都特别强，跟我说你一定是一个做播客的好苗子，所以一定要让我好好和你聊一聊[奸笑]咱们目前的情况可以和我说说呀？', useCount: 0, rate: 0 },
    { id: 1015, product: '播客私教', stage: '建立连接', label: '中医赛道是非常适合播客的，中医大健康…', content: '中医赛道是非常适合播客的，中医大健康做小红书和抖音，一方面现在是非常卷，另一方面是平台对我们的赛道敏感词限制太多了，所以很难做内容，你有感觉到不？\n\n但播客对中医大健康就没有敏感词的限制，你甚至可以肆无忌惮的说关于中医大健康方面内容，以及放你的微信，放你的二维码都可以，所以这就是为什么很多中医大健康赛道的老板他们都会选择布局播客。\n\n那我们已经是走过一轮商业变现的路径了，基础认知很好呀，赚到钱应该不是难事。如果你想做自媒体，现在其他平台都很卷，播客是在蓝海红利期的赛道，你有布局自己播课的想法吗？', useCount: 0, rate: 0 },
    { id: 1016, product: '播客私教', stage: '挖掘需求', label: '咱们付费意识很强，学习的课程也很多，…', content: '咱们付费意识很强，学习的课程也很多，特别有上进心！但为什么一直没赚到钱呢，是因为你一直在学技术，而没有搞明白赚钱的底层逻辑。其实想要赚钱就是一个卖字。\n\n我们现在技能是完全没有问题了就是怎么能够把自己的技术，包装成服务或者产品卖出去。播客就是一个帮咱们把我们的服务产品卖出去的渠道，而且相比其他平台的卷，他现在还是蓝海，还在一个早期爆发期，你目前有布局播客的想法吗？或者是想了解播客是怎么搞钱的吗', useCount: 0, rate: 0 },
    { id: 1017, product: '播客私教', stage: '挖掘需求', label: '那也太可惜了！我们有这样的内容能力，…', content: '那也太可惜了！我们有这样的内容能力，却不变现，我都替你心痛', useCount: 0, rate: 0 },
    { id: 1018, product: '播客私教', stage: '挖掘需求', label: '职场天花板限制，涨薪500可能都要熬…', content: '职场天花板限制，涨薪500可能都要熬个好几年，还得去处理职场当中的勾心斗角，站队，人情世故，不如发展一个第二曲线，做播客卖一个产品就赚500，天花板的高低由我们自己定。', useCount: 0, rate: 0 },
    { id: 1019, product: '播客私教', stage: '挖掘需求', label: '没错！项目的变动是很大的。咱们能够在…', content: '没错！项目的变动是很大的。咱们能够在视频号上赚到六万说明无论我们的执行力还是学习能力都非常强！\n像视频号这样的项目，一方面废号，另一方面你可能需要很多个账号，很多部手机，但是如果想做播客，做一个自己的账号，能卖自己的产品，那就是一个手机一个账号就能赚钱，也不耽误咱们带孩子。咱们已经看到了播客的红利，眼光真的非常敏锐，咱们现在想要做一个自己的播客账号吗？', useCount: 0, rate: 0 },
    { id: 1020, product: '播客私教', stage: '解决顾虑', label: '没问题呀，但为啥要想明年再开始做？心…', content: '没问题呀，但为啥要想明年再开始做？心理咨询这个赛道今年在播客是一个全面爆发，为什么不现在就占住这个位置，明年再干可能就会卷起来啦，咱们现在是时间比较少吗', useCount: 0, rate: 0 },
    { id: 1021, product: '播客私教', stage: '解决顾虑', label: '动力不够说明你缺乏刺激，大家都想改变…', content: '动力不够说明你缺乏刺激，大家都想改变，但是为什么有些人真正改变了，有些人却一直原地踏步？因为真正改变的人会借势，当自律不够的时候会用圈子来用他律刺激自己，刺激着刺激着就变厉害了，对不？', useCount: 0, rate: 0 },
    { id: 1022, product: '播客私教', stage: '解决顾虑', label: '对，你看有专业就更该出产品接用户，有…', content: '对，你看有专业就更该出产品接用户，有专业不赚钱多可惜啊，本来用户就有这样的需求，但最后都交钱给那些半桶水的机构了，好的东西也没有听到也没有流传出来。所以我们专业的人才更应该做产品，更应该去宣传，你觉得是不是？', useCount: 0, rate: 0 },
    { id: 1023, product: '播客私教', stage: '挖掘需求', label: '你的考量特别对，我自己创业这么多年了…', content: '你的考量特别对，我自己创业这么多年了，特别明白项目太容易发生变化了，想要实现复利，就得做自己的内容，做自己的IP。但对于普通人来讲，现在每个平台都特别卷，如果说现在平台还处于早期红利和爆发期的，那就是播客。\n\n而且播客有一个好处就是他作为副业，既有积累，又不用花掉你太多的主业之外的时间，前期你就发布作品，积累到一定数量，一旦起步，就是滚雪球的指数爆发。你有布局播客的打算吗？', useCount: 0, rate: 0 },
    { id: 1024, product: '播客私教', stage: '挖掘需求', label: '为什么很多人做播客赚不到钱，就是因为…', content: '为什么很多人做播客赚不到钱，就是因为纯分享，不会设计成交内容，设计没有钩子。为什么我两位数播放的播客，就能吸引来成交6000+的客户？这个就是播客内容的成交设计效率。', useCount: 0, rate: 0 },
    { id: 1025, product: '播客私教', stage: '挖掘需求', label: '播客在内容和引流上对命理这个赛道很友…', content: '播客在内容和引流上对命理这个赛道很友好，不像你去其他的公域平台，只要讲到命理就很容易被封，我们目前想要自己开一档命理方向能赚钱的播客吗？', useCount: 0, rate: 0 },
    { id: 1026, product: '播客私教', stage: '挖掘需求', label: '想要搞清楚做什么内容，就要先把自己能…', content: '想要搞清楚做什么内容，就要先把自己能卖什么产品梳理清楚，咱们这播课也是冲着持续变现去的对不对？这也是为什么，其他的几百块钱的课程，老师给不了咱们的梳理，但小时老师的私教，就可以帮我们把产品到流量到成交，一整个商业变现链路梳理清楚。其实咱们是很想跟小时老师学习的，对不对？', useCount: 0, rate: 0 },
    { id: 1027, product: '播客私教', stage: '挖掘需求', label: '实体可说的内容太多，这不是刚好和小时…', content: '实体可说的内容太多，这不是刚好和小时姐给实体老板做操盘的经验对上了吗？我们私教学员当中做美业实体的小伙伴上过一次节目之后就开单了2980的实体产品，咱们做实体成本也高，线上引流成本小收益大，咱们想想搞一次活动或者是去发传单，要么就是开销太多，要么就是没有水花，播客线上引流这不是更加适合实体店老板吗，你觉得呢？', useCount: 0, rate: 0 },
    { id: 1028, product: '播客私教', stage: '挖掘需求', label: '是吧，你看播客是一个学习型平台，聚集…', content: '是吧，你看播客是一个学习型平台，聚集在播客的都是像咱们一样又想学习又有付费意识的用户，这批用户咱们看到了机会不拿下不觉得很可惜吗？我觉得咱们可以和我约个咨询详细聊一聊，以我的经验，肯定能够帮咱们开辟出一个线上新的收入渠道，你觉得呢？', useCount: 0, rate: 0 },
    { id: 1029, product: '播客私教', stage: '解决顾虑', label: '我觉得咱们不要对自己妄自菲薄，我听嘉…', content: '我觉得咱们不要对自己妄自菲薄，我听嘉晨老师介绍了一下我们的情况，其实我们的能力非常强，只不过是需要有经验有结果的老师来带着走，这样就能用最少的时间拿到最大的结果，对不对？嘉晨老师应该给咱们介绍了我的私教了，你看需要我再给咱们详细介绍一下吗？', useCount: 0, rate: 0 },
    { id: 1030, product: '播客私教', stage: '解决顾虑', label: '五月份加入当当的私教已经有xxx位开…', content: '五月份加入当当的私教已经有xxx位开启了自己的播客，xx位已经通过播客开启了引流变现，其中有xx赛道xx赛道，当当自己也在这三个月播客收入也突破了xxx，私教内容也进行了更新迭代！\n\n我自己是在刚开始做播客前十期只有二十几个播放三十几个订阅的时候就卖出第一个6000客单价的产品的。去年迎来了爆发，光12月就帮别的老板买了10w+的课程了，当时我还没有自己的产品，只靠分销。\n\n直觉不如结果有说服力，对不对哈哈哈哈哈哈，我就是靠CPS赚到播客的第一桶金的。\n\n我在刚开始做播客前十期只有二十几个播放三十几个订阅的时候就卖出第一个6000客单价的产品的。去年光12月就帮别的老师买了10w+的课程了，当时我还没有自己的产品，只靠分销。', useCount: 0, rate: 0 },
    { id: 1031, product: '播客私教', stage: '建立连接', label: '三个月，罗永浩还有明星都入场了，播客…', content: '三个月，罗永浩还有明星都入场了，播客蓝海红利的含金量还在不断升高！[奸笑]\n\n没错！播客这条路真的是大蓝海，未来会和小红书一样引流嘎嘎猛，虎牙总有发展播客的想法吗？\n\n这就是业务做的好的大佬吗？还没有做播客的想法就已经吃到红利了哈哈哈，这次我的生日会也会分享很多关于播客的干货，欢迎虎牙总来围观呀！', useCount: 0, rate: 0 },
    { id: 1032, product: '播客私教', stage: '建立连接', label: '没问题！前几天我播客私教里做大健康和…', content: '没问题！前几天我播客私教里做大健康和医美赛道的小伙伴才给我报喜从播客来的客户买了4位数的产品，咱们中医针灸这个赛道不做播客实在是太可惜啦！希望咱们能把从分享里学到的用起来呀！加油！\n\n前两天我这边做心理咨询赛道的私教，不断给我报喜说她的播客私域进人开单率很高。如果你有布局播客的想法，要赶紧做起来了，金九银十，这钱哗哗来[奸笑]要不要考虑进我的播客私教？让我多一个嘎嘎出成绩的学员案例\n\n又给你送来一个客户啦[奸笑]有没有感受到播客这恐怖的引流转化效率哈哈哈。尤其是心理赛道，最近的流量不要太好！两位数三位数的播放就能引流转化好几个，你现在打算布局自己的播客了不？这泼天的流量不接我都觉得可惜哈哈哈', useCount: 0, rate: 0 },
    { id: 1033, product: '播客私教', stage: '建立连接', label: '中医这个赛道天花板太高了！我可以和你…', content: '中医这个赛道天花板太高了！我可以和你说，我认识的中医朋友，他们的年营收都是往7位数8位数走的。而且你已经有了要用自媒体把自己的产品打出去的认知，这个基础已经很好了。\n\n而且插画和设计这个赛道的天花板很高，但是很多做审美力这个板块的老师，是能月入六位数的水平。', useCount: 0, rate: 0 },
    { id: 1034, product: '播客私教', stage: '挖掘需求', label: '我的播客私教里也有很多像咱们这样的学…', content: '我的播客私教里也有很多像咱们这样的学员，我会先帮我们梳理目前的情况，帮我们搞定要卖什么产品。\n\n咱们的认知很高啦，也很有经验！财会是做播客特别好的赛道，如果你目前有能够分销的产品，播客就是一个很好的放大的机会，我做播客赚钱，就是从分销其他老师的产品开始的。\n\n我的私教里有一位学员叫静水老师，她也是做财会的，他发烧，自己的产品能发售到6位数，也开始布局播客，就是为了早入局播客这个蓝海红利，早就是优势，你目前有想布局自己的播客吗？\n\n对的，她是我的私教学员，她的播客内容和播客变现路径是我给她设计的，已经引流来了好几个意向客户。', useCount: 0, rate: 0 },
    { id: 1035, product: '播客私教', stage: '解决顾虑', label: '你能在视频号上出结果，执行力和学习能…', content: '你能在视频号上出结果，执行力和学习能力绝对够强！把播客的赚钱流程搞明白，跟着有结果的老师走，听话照做，一定也能出结果。\n\n我在圈子里这么久，程序员转型是最能成事的，因为你们的执行力和学习能力够强，专业能力也够硬，有老师带着走，也肯听话照做。', useCount: 0, rate: 0 },
    { id: 1036, product: '播客私教', stage: '解决顾虑', label: '其实现在能赚到钱的是综合能力强的全才…', content: '其实现在能赚到钱的是综合能力强的全才，而不是专才。所以你走的每一步都算数，都不白走，这也是你的优势。普通人想赚到钱，一定要懂得抓红利，改变临门一脚开始的，你觉得我说的对吗？咱们对权益有任何问题也可以滴滴我哈。', useCount: 0, rate: 0 },

    { id: 1038, product: '播客私教', stage: '建立连接', label: '心理咨询这个赛道我很熟悉了，我的很多…', content: '心理咨询这个赛道我很熟悉了，我的很多学员都是这个赛道的，播客可以说是心理咨询赛道优质用户的聚集地。可能小红书一个10w+的爆款引流来的人，都不如一档播客两位数播放引流来的客户付费能力和意愿强。咱们的商业嗅觉很敏锐呀！咱们想了解一下我的播客私教吗，还是想先进咱们的社群了解一下播客是怎么赚钱的呀？\n\n心理咨询赛道是一个特别适合播客的赛道，这两天我做心理咨询的学员还在给我报喜，说播客引流转化效率很高。', useCount: 0, rate: 0 },

    { id: 1058, product: '播客私教', stage: '最后成交', label: '我一定要记住宝，你是在我生日分享会开…', content: '我一定要记住宝，你是在我生日分享会开播第一天加入我的！给你发咱们的海报，单独加入我的播客私教是4999。\n\n我的这次生日会和粥佐罗老师，还有靠谱老师进行了一个福利联动，如果咱们想要加入销冠群或者是顶峰会的话，咱们今天加入，我直接给咱们送我们的播客私教。\n\n看看宝有没有需求如果想单独加入我的播客私教的话，咱们今天就可以加入啦，我马上来给咱们安排。我们的播客富豪群又要再多一位富豪啦，放心跟着我在播客的路上搞钱冲刺！', useCount: 0, rate: 0 },
    { id: 1059, product: '播客私教', stage: '解决顾虑', label: '我觉得咱们的基础太好了，我已经迫不及…', content: '我觉得咱们的基础太好了，我已经迫不及待想给咱们做定位咨询了，我做播客一年变现了50个w，我觉得你跟着我做播客，会用比我短的时间获得比我更多的收益。这是我们的海报也给咱们看看，你看看想不想加入我，往一年50个上干？\n\n我还看到咱们把播客的计划写到了社群的置顶，有你这样的执行力，你做什么都会成功的！我太期待你未来加入我的播客私教了，这样我又能拥有一个神仙学员，一个超绝案例了，你做播客绝对能行，想到半夜都得笑出声了哈哈哈哈\n\n我有预感，咱们富豪群又要再多一个靠播客一年卖50万的实体老板了[奸笑]', useCount: 0, rate: 0 },

    { id: 1069, product: '播客私教', stage: '最后成交', label: '咱们在9月10号之前绑定我，我可以再…', content: '咱们在9月10号之前绑定我，我可以再送咱们一个福利，这个福利我没有送过给其他人，IP口播训练营，视频播客两手抓，你看看你想要吗？[呲牙]', useCount: 0, rate: 0 },
    { id: 1070, product: '播客私教', stage: '解决顾虑', label: '其实并不是，像我这边做美业产品的学员…', content: '其实并不是，像我这边做美业产品的学员，一档播客两位数的播放就卖出去了2980的实体产品。我好像在彩卉团队的操盘上看到过你，你是彩绘团队的小伙伴吗，彩卉顺顺大牙都是我的私教学员哈哈，刚好在9月10号涨价之前绑定我，你们还可以一起做播客[奸笑]', useCount: 0, rate: 0 },
    { id: 1071, product: '播客私教', stage: '解决顾虑', label: '我们的私教，9月10号就会涨价了，如…', content: '我们的私教，9月10号就会涨价了，如果我们真的想学习，想把播客搞钱的这个闭环打通，想体验这种赚钱上瘾的感觉，可以在9月10号之前绑定我，晚学不如早学，与其犹豫几天，等它涨价了，你还是要付这个钱，还不如现在就锁死这个优惠。你从嘉晨老师那里入，还能拿到她的福利，这样性价比就拉满了，你觉得呢？', useCount: 0, rate: 0 },
    { id: 1072, product: '播客私教', stage: '挖掘需求', label: '嘉晨老师和我说了咱们的情况啦，我看到…', content: '嘉晨老师和我说了咱们的情况啦，我看到咱们制定的目标了，那我觉得咱们一定是执行力很强的！跟着我一步一步做播客，我相信咱们也能够早日达成你的目标[拳头]嘉晨老师应该给咱们介绍了权益了，需要我再给咱们介绍一遍吗？\n\n有目标是一件好事，这样执行力就能跟得上，如果空有目标没有执行就是空想，对吧？但我觉得既然咱们敢定下这样的目标，执行力一定没有问题！后续就听话照做，在做事上下功夫，就能早日目标达成[拳头]', useCount: 0, rate: 0 },
    { id: 1073, product: '播客私教', stage: '挖掘需求', label: '我也听嘉晨老师介绍了一下我们的情况，…', content: '我也听嘉晨老师介绍了一下我们的情况，嘉晨老师也是最近加入了我的播客私教，也给我推荐了非常多的学员，咱们想不想了解一下我们的播客私教服务呀？我给咱们梳理一下，我会怎么帮咱们去整合现在的资源，搭建一个未来能够往6位数收益上冲的播客账号，你完全有这个实力哈哈哈', useCount: 0, rate: 0 },
    { id: 1074, product: '播客私教', stage: '挖掘需求', label: '因为我们目前没有得到过正反馈，我们经…', content: '因为我们目前没有得到过正反馈，我们经过调整之后发出第1期节目卖出第1个产品，你就有感觉了哈哈哈。\n\n那咱们这个内容力真的很强了，在没有怎么去打磨内容的情况下，就已经积累了五六万粉丝，还已经引流到私域500人，这些人并不是没有用了，他都是我们的潜在客户，我们之后是可以把他们激活的。', useCount: 0, rate: 0 },
    { id: 1075, product: '播客私教', stage: '解决顾虑', label: '报过很多课程没拿到结果。我们就应该展…', content: '报过很多课程没拿到结果。我们就应该展开分析背后的原因，比如说是不是只学，没有做赚钱的动作，或者说没有人带，或者说能量低，只要找到原因，用户自然就知道未来要怎么去选择课程，要怎么付费。\n\n与其去报一些不痛不痒的技能培训或者认知课程，三个月半年都不一定能够赚到第1个1000元，不如一步到位来报我的播客私教，我直接帮咱们打通像静水老师那样的商业模式，一步一步带着我们走，你觉得怎么样？\n\n而且加入私教之后，剪辑营，语音写作和我的搞钱社群都是送给你的，如果今天你绑定我，我肯定不能让咱们白来，我再送给你一个其他人都没有的福利[奸笑]好不好？', useCount: 0, rate: 0 },
    { id: 1076, product: '播客私教', stage: '解决顾虑', label: 'xxx是10年的，不急一时，哪怕现在…', content: 'xxx是10年的，不急一时，哪怕现在没空学，也没关系。进来了先感受一下气氛，认识多点朋友，等你准备好了，我再带你一起开干。\n\n我很多小伙伴都是小白，也没有一技之长，人家也能够通过做私域月入过万。那你有xx技能，如果懂得传播，懂得运营私域，其实你很有优势，嫁接顶峰会，再加上运营私域你的业绩一定能够翻个两三倍，你要月入过万，其实并不难。\n\n宝你太棒了！你能在主业工作这么忙的情况下，还能抽出时间学习播客剪辑，你的执行力没有任何问题，咱们之前聊的时候，我也感受到了你很愿意努力而且很有搞钱天赋，咱们现在退出，我觉得太可惜了。\n\n我特别理解咱们现在时间比较紧张，害怕跟不上进度，没有关系。我给咱们安排好，课程咱们可以永久回看，等你忙完这段时间，我给宝安排免费复训，你觉得好不好？\n\n我一直都有关注你，我觉得你是有优秀学员的潜质的，有其他的情况也可以和我说呀，我也尽量给咱们安排调整好嘛，要相信自己没问题，我也相信你！', useCount: 0, rate: 0 },
    { id: 1077, product: '播客私教', stage: '解决顾虑', label: '咱们同时做这么多事[强]真不错。我的…', content: '咱们同时做这么多事[强]真不错。我的很多私教学员也和咱们一样，需要社群维护，也需要写内容，还需要管自家的小朋友，但他们也很快做出了自己的播客，因为能把AI用起来，把咨询素材用起来。\n\n一个人能不能做得起来，要看动力，咱们动力已经很充足啦，一件事你越想做你越做得成。\n\n我马上就要开自己的生日分享会了，咱们已经在群里了嘛？如果还没在，我来拉咱们一下呀。\n\n我的生日会之后，我的播客私教就要涨价啦，咱们在生日分享会期间，也可以给我付一个199咨询金把名额锁住哈。', useCount: 0, rate: 0 },
    { id: 1078, product: '播客私教', stage: '最后成交', label: '299社群的人如果想做播客，但又文字…', content: '299社群的人如果想做播客，但又文字沟通又犹豫的，可以让她们付一个咨询金，做一次咨询，咨询成交就入私教或者入其他产品补差价，入不了的就退回就好了', useCount: 0, rate: 0 },
    { id: 1079, product: '播客私教', stage: '最后成交', label: '没问题呀，咱们剪辑营现在是399，咱…', content: '没问题呀，咱们剪辑营现在是399，咱们的剪辑营刚刚开营，可以直接转我，我抱咱们进群啦！\n\n而且你刚好赶上了，我马上要开我的播客生日分享会，咱们加入播客剪辑营之后可以再送我们团队的一次一对一咨询！\n\n这个1对1咨询对外都是4位数的价格，刚好赶上我这次生日分享会，所以就作为福利送给你啦！\n\n我马上要开我的播课生日分享会啦，会分享播客如何搞钱，那我先拉咱们进群，你可以在这几天听一下分享呀', useCount: 0, rate: 0 },
    { id: 1080, product: '播客私教', stage: '解决顾虑', label: '这是我给社群小伙伴咨询之后，她写的复…', content: '这是我给社群小伙伴咨询之后，她写的复盘和如何让咨询收获最大化，我也发出来分享给大家。', useCount: 0, rate: 0 },
    { id: 1081, product: '播客私教', stage: '解决顾虑', label: '这是咱们每个月一次的搞钱社群圆桌会，…', content: '这是咱们每个月一次的搞钱社群圆桌会，也是小时老师的私教可以参加的活动！咱们之前是不是咨询过小时老师呀，咱们目前还有做播客的想法吗？', useCount: 0, rate: 0 },
    { id: 1082, product: '播客私教', stage: '最后成交', label: '宝非常感谢你对咱们的支持，我们这边也…', content: '宝非常感谢你对咱们的支持，我们这边也有非常多做播客的老板想要找播客剪辑，单子还挺多的，我希望给我的学员匹配的剪辑都是质量比较高的剪辑，所以我会先要求先经过培训，你看你要不要入一个我们的剪辑营，现在是399，来系统训练一下剪辑播客的能力。\n\n学习之后，咱们水平达标，我给咱们安排单子，399也很快能回本了也能赚，你觉得怎么样？', useCount: 0, rate: 0 },
    { id: 1083, product: '播客私教', stage: '最后成交', label: '这个社群只要299，当然了，如果想要…', content: '这个社群只要299，当然了，如果想要跟我们一对一学习，我这边还有私教服务，现在是一年陪跑4999，咱们可以先进社群了解一下，咱们的动力这么足，我相信我的社群一定对咱们有帮助，你觉得是不是？', useCount: 0, rate: 0 },
    { id: 1084, product: '播客私教', stage: '解决顾虑', label: '没错是这样的，那我们是军人执行力和学…', content: '没错是这样的，那我们是军人执行力和学习能力肯定没得说！大健康这个赛道的天花板和利润都非常高，在播客上做大健康品类的以及我的学员，现在卖的单个产品都是5位数往上走的。\n\n咱们可以先加我一个播客搞社群，了解一下播客是怎么搞钱的。我会每天在群里分享搞钱播客的干货，以及我们每个月会有一次视频号连麦，咱们可以和我咨询你在搞钱路上遇到的问题，包括推荐你的产品，这个内容我会放在我自己的播客节目上，现在也不贵，但是是需要付费的，咱们看看要入一个不？', useCount: 0, rate: 0 },
    { id: 1085, product: '播客私教', stage: '解决顾虑', label: '那咱们可以先加我一个播客搞社群，了解…', content: '那咱们可以先加我一个播客搞社群，了解一下播客是怎么搞钱的。我会每天在群里分享搞钱播客的干货，以及我们每个月会有一次视频号连麦，咱们可以和我咨询你在搞钱路上遇到的问题，包括推荐你的产品，这个内容我会放在我自己的播客节目上，现在也不贵，但是是需要付费的，咱们要入一个不？', useCount: 0, rate: 0 },
    { id: 1086, product: '播客私教', stage: '解决顾虑', label: '就是播客一定要有人手把手带着你，能在…', content: '就是播客一定要有人手把手带着你，能在一个圈子里，才能一直做下去\n\n你要是来了，我就有播客搭子了[奸笑]一起干！咱俩未来可能还能一起共创一个产品，你觉得咋样', useCount: 0, rate: 0 },
    { id: 1087, product: '播客私教', stage: '解决顾虑', label: '不过我还是觉得你更适合私教，我和你说…', content: '不过我还是觉得你更适合私教，我和你说我的真实感觉\n\n我觉得你在链路上已经完全没有什么问题了，现在就是怎么做产品，怎么做内容下钩子。如果你想找当老师聊，要不要再付费约当老师做一次咨询呢？当老师好就好在所有的费用都能抵扣。\n\n对呀，你的想法真的很好，让小时老师帮你把整个链路梳理打通，一对一的档案真的很手把手，我自己也觉得你很适合，你打算来不哈哈哈？来的话从我这走呀，我送你福利[奸笑]', useCount: 0, rate: 0 },
    { id: 1088, product: '播客私教', stage: '解决顾虑', label: '看了你的介绍，觉得你太棒啦，特别上进…', content: '看了你的介绍，觉得你太棒啦，特别上进未来可期的一个女孩子[强]盖洛普可以详细的告诉你，你要如何用好自己，给你详细分析你自己的使用说明书，我给咱们推荐我们播客当中的盖洛普教练，叶叶老师，你可以在她那里付费做一个专业盖洛普测试，测试之后。你就能明白你的哪些才干突出，对自己后续的职业规划有一个清晰的调整。\n\n像咱们这样敢于改变，想要改变的女孩子，一定能越来越好[强]\n\n这是叶叶老师的名片，咱们可以添加她一下呀', useCount: 0, rate: 0 },
    { id: 1089, product: '播客私教', stage: '最后成交', label: '我还是建议小时姐直接设置199的咨询…', content: '我还是建议小时姐直接设置199的咨询，不合适可退。咨询前填一个调查问卷，把用户目前遇到的问题，想要学习什么方面的内容，预算多少，了解清楚。\n\n因为小时姐这次卖的产品比较多，规则比较复杂的话解释成本就比较高。小时姐这次每场直播卖的产品也都不同。\n\n比如说小时姐和粥老师卖顶峰会，那299买人生设计营或者是搞钱社群，那我们还要需要对这两个产品做说明，就没必要，理解成本太高了。\n\n咱们就设置一个199的咨询金，拍下以后送一次一对一咨询，咨询以后不合适退还，规则越简单，用户理解成本越低。\n\n这样的话，199对于很多人来讲，我既能获得一次1对1咨询咨询，之后不满意还能退，就没有任何损失，那大家其实是愿意去拍这个199的，然后我们电话咨询能比在直播间更深度的触达他，成交他\n\n那我觉得可以这样设置一个199的咨询金，就是送他一对一的咨询，如果咨询之后不合适可以退，也可以选择补100进入社群', useCount: 0, rate: 0 },
    { id: 1090, product: '播客私教', stage: '最后成交', label: '咱们这次分享会，我也给大家带来了很重…', content: '咱们这次分享会，我也给大家带来了很重磅的福利——这次给大家设置了199的咨询金。\n\n只要大家支付了199咨询金，就能得到，包含我和我的团队一次1对1咨询的三重福利，这个咨询单独对外卖是要卖到4位数的。\n\n这个咨询金也不是随便付的，我也不是谁都收的，我只收真正想通过播客搞钱，有决心有执行力，真心想跟我学习播客的小伙伴。\n\n咨询也是一个筛选，我们大家双向奔赴，支付咨询金之后，想加入我的任何产品都可以后续补差价。如果沟通觉得不合适，咨询金也会原路退回，相当于咨询送给大家。\n\n咨询金有效期仅限当当生日分享会期间。大家可以直接找我拍哈。', useCount: 0, rate: 0 },
    { id: 1091, product: '播客私教', stage: '最后成交', label: '可以是资料，但我会觉得这个咨询会更加…', content: '可以是资料，但我会觉得这个咨询会更加适合你，咱们付的这个199咨询金，如果想加入我学习可以抵扣任何产品，如果还想自己沉淀一下，这个咨询金也是会退给咱们的，相当于送咱们一次咨询', useCount: 0, rate: 0 },
    { id: 1092, product: '播客私教', stage: '最后成交', label: '没问题呀，刚好我的生日分享会有一个福…', content: '没问题呀，刚好我的生日分享会有一个福利，咱们可以交一个199咨询金，我们可以给咱们做一个梳理，梳理之后无论是想补差价，还是觉得想要沉淀一下原路退回都没问题哈，咱们也没有任何损失，这个福利是仅限9月5号之前预约才有的哈，你看看要约一个咨询吗？', useCount: 0, rate: 0 },
    { id: 1093, product: '播客私教', stage: '最后成交', label: '对了宝，咱们付199做咨询，我会让我…', content: '对了宝，咱们付199做咨询，我会让我的团队小伙伴给咱们做，如果咱们想直接和我咨询的话，也可以直接约我一个888的咨询，后续可以抵扣私教，你看看你是选和我团队的小伙伴做咨询，还是和我直接做咨询呀？\n\n可以约咨询呀，咱们的私教是无限次咨询，我们也可以先给我付一个888，我们来约一个咨询，我来给咱们梳理一下，之后是可以抵扣咱们的私教服务的', useCount: 0, rate: 0 },
    { id: 1094, product: '播客私教', stage: '解决顾虑', label: '哈喽宝，我来给咱们说个好消息，给咱们…', content: '哈喽宝，我来给咱们说个好消息，给咱们发福利来了[奸笑]当当正在开生日分享会，也趁这个时间给大家发一波福利，最近加入当当产品的小伙伴，我再送大家一次我团队的1v1咨询，帮大家梳理目前的卡点。\n\n平时这个咨询对外单独要卖到4位数，是不是超级重磅！大家可以填写以下问卷，我来给大家安排1v1咨询福利兑换呀。\n\n由于福利名额有限，兑换的小伙伴很多，所以咱们的1v1咨询福利兑换仅限当当生日会分享期间（8月27日-9月5日）兑换哈，咱们填写问卷之后可以滴滴我呀，我来给咱们安排。', useCount: 0, rate: 0 },
    { id: 1095, product: '播客私教', stage: '最后成交', label: '好呀没问题，我这边的咨询是888一次…', content: '好呀没问题，我这边的咨询是888一次，我也给咱们说一下，我会给咱们讲什么？\n\n我会先了解咱们的情况，根据你的情况来给你做一个商业路径的梳理，一方面是你的产品怎么做，你的流量怎么做，以及引流到私域的成交，另一方面是怎么整合你目前的资源，把能成交掉的人群成交掉。\n\n经过这次咨询，你就会比较清楚你该做什么样的动作，以及后续要怎么去设计路径了。咱们如果觉得没问题，就可以直接给我转哈，如果未来你加入我的私教，这个咨询费是可以抵扣掉的。', useCount: 0, rate: 0 },
    { id: 1096, product: '播客私教', stage: '建立连接', label: '让他们进群，进群之后可以反复触达，提…', content: '让他们进群，进群之后可以反复触达，提醒他们去预约直播。\n\n哈喽顶峰会的小伙伴！今天是我生日会分享的第1天，今晚8点，我会和粥左罗老师连麦！\n\n给大家分享我加入顶峰会之后，是如何在粥老师的帮助下，一年实现400w+播放量变现50w的，分享写作和播客搞钱秘籍！\n\n我和粥老师还给大家准备了超多重磅福利，来听就是赚到呀！还有我的社群生日抽奖，奖品很牛，看看你的欧气牛不牛[奸笑]\n\n这是今晚直播预约码👇\n\n想要进群给我扣个1⃣️我直接拉你，咱们晚上见！', useCount: 0, rate: 0 },
    { id: 1097, product: '播客私教', stage: '建立连接', label: '当当的这次生日会分享圆满结束啦！我把…', content: '当当的这次生日会分享圆满结束啦！我把这次生日会的所有大咖分享精华都做了打包，咱们如果想要领取，可以给我扣个1⃣️呀，我来给咱们发精华打包！\n\n把之前聊过但是没有下文的小伙伴，发一份昨晚直播的笔记福利，然后说明交199咨询金，送我的价值599元的福利。\n\n特别是问卷中填写了期待昨晚这场直播的人。', useCount: 0, rate: 0 },
    { id: 1098, product: '播客私教', stage: '解决顾虑', label: '昨晚和靠谱老师连麦，如何从社恐到销冠…', content: '昨晚和靠谱老师连麦，如何从社恐到销冠，直播笔记精华给咱们整理好啦，咱们想要领取可以给我扣个1，我给咱们发放呀。\n\n【等回复，回复后】\n\n发放PDF+这是昨晚的直播精华，咱们的福利记得不要错过！\n\n仅限生日会期间，9.5日之前给大家准备了199咨询金福利，拍下直接送你一次价值888的咨询。现在福利还加码，今天只要拍下199咨询金就再送大家价值599的《MBTI识人与沟通力拿捏》，高客单17999转化率如何高达60%的心法都在里面。\n\n支付199之后，如果想要买我的产品可以补差价，咨询之后准备自己再沉淀沉淀的，199会全部退回，相当于送你一次咨询呀。\n\n如果想要领取咨询福利，可以直接转我199啦，我给宝子安排上~', useCount: 0, rate: 0 },
    { id: 1099, product: '播客私教', stage: '最后成交', label: '可以这样：', content: '可以这样：\n1、自我介绍发IP文链接+还没进社群的邀请进群\n2、进群之后，再私聊触达，从直播间加过来的估计都是粥老师的人，可以再私聊\na是否已经在顶峰会\nb对播客是否感兴趣，是否想自己做一档播客，挖掘需求\nc转199咨询金咨询', useCount: 0, rate: 0 },
    { id: 1100, product: '播客私教', stage: '建立连接', label: '哈喽宝，我来感谢一下咱们，我看咱们一…', content: '哈喽宝，我来感谢一下咱们，我看咱们一直在关注咱们的直播呀，给你发一下我们直播的精华总结。【发pdf】\n\n咱们业务发展到哪一步啦？是想自己做一档播客不？', useCount: 0, rate: 0 },
    { id: 1101, product: '播客私教', stage: '建立连接', label: '《我靠播客赚到50万一周年深度复盘精…', content: '《我靠播客赚到50万一周年深度复盘精华》，是我送给所有朋友的一份时间纪念册。\n这一年，我靠播客从0走到50万，每一场直播、每一次试错、每一位用户的反馈，都被完整记录了下来。\n最终沉淀成这份超过6万字的复盘手稿。\n你可以把它当成一本"实战教科书"，也可以把它当成我和你的一次长谈。\n如果你没时间从头读到尾，可以直接翻到目录，找到你最关心的那一章。\n如果你愿意慢慢啃完全文，那我敢保证：你会在字缝里看到一个人如何用播客从试水到翻盘，从困境到搞钱的全部过程。', useCount: 0, rate: 0 },
    { id: 1102, product: '播客私教', stage: '解决顾虑', label: '这是我送给所有关注播客搞钱的朋友的一…', content: '这是我送给所有关注播客搞钱的朋友的一份沉甸甸的复盘。\n从第一期播客上线，到一年后靠播客累计变现50万，这中间我走过的每一步，都被浓缩在这份长达6万字的精华文档里。\n它不仅是一份复盘，更是一份操作手册。\n你会看到：\n* 我如何在零粉丝、零经验的情况下切入赛道；\n* 如何通过播客精准引流，建立信任；\n* 如何用访谈成交，搭建产品闭环；\n* 以及如何把播客做成一条真正能搞钱的商业路径。\n我希望，当你读完之后，能对自己说： "原来播客可以这样搞钱，我也可以。"', useCount: 0, rate: 0 },
    { id: 1103, product: '播客私教', stage: '最后成交', label: '我的播客私教9月10日正式涨价啦！想…', content: '我的播客私教9月10日正式涨价啦！想要抓住优惠的尾巴，绑定我的小伙伴，这两天可以和我聊一聊呀。或者给我付一个199咨询锁定金，我会帮咱们把名额保留到9月20日。\n\n刚好我们来的也很巧，现在还有一个福利是可以付199咨询金，9月10日之前可以给咱们做一个咨询梳理，如果想要和我学习可以补差价，如果想要自己沉淀一下，199也会退回，相当于送咱们一个咨询，咱们看看要约一个不？\n\n咱们看要约我一个不？咱们私教9月10号也要涨价了，刚好在这个节点之前绑定我，直接赚到[奸笑]', useCount: 0, rate: 0 },
    { id: 1104, product: '播客私教', stage: '最后成交', label: '我提醒一下小伙伴，我老师的私教服务9…', content: '我提醒一下小伙伴，我老师的私教服务9月10号又要涨价了哈哈哈，在9月10号之前绑定，还能再拿到小时老师的一个福利，咱们现在来问也是一个很巧妙的时间点，如果咱们笃定了想和小时老师学习，觉得早晚都要来的话，现在绑定不就省钱了吗，是不是哈哈哈？', useCount: 0, rate: 0 },
    { id: 1105, product: '播客私教', stage: '解决顾虑', label: '没问题呀，我的生日会之后，我的播客私…', content: '没问题呀，我的生日会之后，我的播客私教就要涨价啦，咱们在生日分享会期间好好看一看咱们的分享，如果确实很想和我学习，也可以直接给我付一个199咨询金把名额锁住哈。\n\n这个199咨询金，后续咱们想要报名产品可以抵扣差价，支付之后我们送咱们团队的一次1v1咨询，这是只在我生日分享会期间才有的哦，这个福利是不是很牛哈哈哈，你要不要锁一个？', useCount: 0, rate: 0 },
    { id: 1106, product: '播客私教', stage: '解决顾虑', label: '晚学不如早学，与其犹豫几天，等它涨价…', content: '晚学不如早学，与其犹豫几天，等它涨价了，你还是要付这个钱，还不如现在就锁死这个优惠。', useCount: 0, rate: 0 },
    { id: 1107, product: '播客私教', stage: '最后成交', label: '咱们也可以花299加入搞钱社群，很便…', content: '咱们也可以花299加入搞钱社群，很便宜，在社群里也可以听我讲播客怎么搞钱，以及能和我连麦，咱们也是链接上啦！咱们要入一个社群吗，让我的社群又再多一位大佬哈哈哈！', useCount: 0, rate: 0 },
    { id: 1108, product: '播客私教', stage: '最后成交', label: '可以说私教9月10号涨价，但他付了1…', content: '可以说私教9月10号涨价，但他付了199，锁定了优惠价格，可以帮他保留到9月20号\n\n然后9月20号之前可以再送他一个福利逼逼单，也可以和她说有缓冲期，可以，等他时间差不多充裕了再开始，反正迟早都是要跟小时姐学习的，不如现在就用这个优惠价格先拍下', useCount: 0, rate: 0 },
    { id: 1109, product: '播客私教', stage: '建立连接', label: '我刚给嘉晨梳理来着，想到你了，来问问…', content: '我刚给嘉晨梳理来着，想到你了，来问问咱们决定好要和我还有嘉晨老师一起搞钱搞流量了不？[呲牙]', useCount: 0, rate: 0 },
    { id: 1110, product: '播客私教', stage: '建立连接', label: '你看看你想和我学习不？如果对权益有问…', content: '你看看你想和我学习不？如果对权益有问题也可以滴滴我哈。\n\n你看看你想跟我学习吗？如果对权益有任何问题也可以滴滴我哈。\n\n你看看想跟我学习不，我给你发我们的私教海报？\n\n你看你想了解一下吗？\n\n你看看想不想加入我，往一年50个上干？\n\n你觉得呢？\n\n你觉得怎么样？', useCount: 0, rate: 0 },
    { id: 1111, product: '播客私教', stage: '解决顾虑', label: '可以给咱们选择呀，你是想直接要资料呢…', content: '可以给咱们选择呀，你是想直接要资料呢，还是想要咨询呀？', useCount: 0, rate: 0 },
    { id: 1112, product: '播客私教', stage: '最后成交', label: '那咱们要不要来我的播客搞钱社群，现在…', content: '那咱们要不要来我的播客搞钱社群，现在也不贵299，在社群可以听一下一档能赚钱的播客要怎么做，还能每个月和我连麦一次，我们的连麦也会房到我的播客节目里，你看看想加入不？\n\n那我觉得你可以先加入一个搞钱圈子感受一下，你看看要不要花一个299加入我的播客搞钱社群？也不贵，我会持续分享如何用播客搞钱，每个月还会连麦一次学员，为学员解决搞钱卡点，内容会放到我的播客节目上去，咱们也可以抓住和我连麦的机会呀，你要来不？\n\n那咱们目前除了想要和小金刚老师了解人格解析之外，有没有想要加入搞钱圈子的想法呀？搞钱圈子是刺激最大给咱们动力最足的，你看看我们这一群圈友就知道，搞钱搞流量[奸笑]', useCount: 0, rate: 0 },
    { id: 1113, product: '播客私教', stage: '最后成交', label: '没问题啊，你可以关注一下我喜马拉雅和…', content: '没问题啊，你可以关注一下我喜马拉雅和小宇宙的播客，搞钱搞流量。我这边还有一个播客搞钱群，目前是299也不贵，每个月能够跟我连麦一次，我也会放到我的播客节目里，如果咱们想要和我连麦，想要了解播客是怎么搞钱的，也可以加入我的社群呀，一起播客搞钱[机智]\n\n如果咱们有想要做播客的想法，可以先来我们的播客搞钱社群呀。或者想了解播客剪辑，也可以加入我们的剪辑营。加入剪辑营，搞钱社群会直接送给你，我这边的产品都能补差价，咱们看看要了解一下不？[机智]', useCount: 0, rate: 0 },
    { id: 1114, product: '播客私教', stage: '最后成交', label: '很优秀呀，也趁这个机会链接上我们销冠…', content: '很优秀呀，也趁这个机会链接上我们销冠家人了，如果咱们对播客感兴趣的话，也可以加入我的播客搞钱社群，也不贵299，我会在社群里分享播客是怎么搞钱的，每个月会提供一次连麦，可以在视频号上咨询我问题或者推荐自己的产品呀，我会放到我的播客上，咱们看看要来不？\n\n感谢你的喜欢呀，如果咱们想要进一步链接，我也可以加入我的299播客搞钱社群，我会持续在社群里分享，每个月会和学员连麦一次，咱们连麦的内容还会放到我的播客节目上[机智]\n\n如果还想深度绑定我，能跟我进一步一对一沟通，也可以考虑我的私教呀，如果咱们想要了解我的私教权益，我可以给咱们介绍一下呀，咱们看看要不要入一个？绑定小时[奸笑]', useCount: 0, rate: 0 },
    { id: 1115, product: '播客私教', stage: '解决顾虑', label: '就是播客一定要有人手把手带着你，能在…', content: '就是播客一定要有人手把手带着你，能在一个圈子里，才能一直做下去\n\n你要是来了，我就有播客搭子了[奸笑]一起干！咱俩未来可能还能一起共创一个产品，你觉得咋样', useCount: 0, rate: 0 },
    { id: 1116, product: '播客私教', stage: '解决顾虑', label: '不过我还是觉得你更适合私教，我和你说…', content: '不过我还是觉得你更适合私教，我和你说我的真实感觉\n\n我觉得你在链路上已经完全没有什么问题了，现在就是怎么做产品，怎么做内容下钩子。如果你想找当老师聊，要不要再付费约当老师做一次咨询呢？当老师好就好在所有的费用都能抵扣。\n\n对呀，你的想法真的很好，让小时老师帮你把整个链路梳理打通，一对一的档案真的很手把手，我自己也觉得你很适合，你打算来不哈哈哈？来的话从我这走呀，我送你福利[奸笑]', useCount: 0, rate: 0 },
    { id: 1117, product: '播客私教', stage: '解决顾虑', label: '哈哈哈那可以让她来分享会，我感觉像这…', content: '哈哈哈那可以让她来分享会，我感觉像这种就是有意向，但是马上转化不一定能转化得掉，可以这样说:\n\n我看你挺感兴趣的，播课是我特别看好的一个赛道，这个老师也是我特别喜欢的老师非常专业，如果你想布局播客的话，现在金9银10确实是一个好的时候，这位老师的私教马上就要涨价了，你看看你想不想跟她学习，想的话我来给你介绍一下权益好不？', useCount: 0, rate: 0 },
    { id: 1118, product: '播客私教', stage: '解决顾虑', label: '我你目前有自己的产品 了吗，我看咱们…', content: '我你目前有自己的产品 了吗，我看咱们说对播客感兴趣，想要自己做一档赚钱的播客吗？\n\n你有这样的意识就已经超越了80%的人了！提前恭喜你了，有这样的意识，我们一定能在自媒体上取得很不错的成绩[强]\n\n我目前这边自媒体的产品还挺多的，如果你想跟我学习的话，我可以直接给你介绍一下我的播客私教权益，我这边还有粥佐罗老师和其他老师的自媒体课程，你看看你想先了解哪一个？', useCount: 0, rate: 0 },
    { id: 1119, product: '播客私教', stage: '解决顾虑', label: '好勒，没问题找到就好。咱们是鸿宇老师…', content: '好勒，没问题找到就好。咱们是鸿宇老师团队的小伙伴，也做心理赛道，有没有想像鸿宇老师一样自己做一档赚钱播客的想法呀？\n\n那太牛啦，咱们链接我是觉得播客还有能做的更好的地方吗？让我们的影响力能扩散更多人[奸笑]\n\n那很优秀呀，咱们目前有做播客的想法吗？', useCount: 0, rate: 0 },
    { id: 1120, product: '播客私教', stage: '建立连接', label: '你好呀，感恩遇见', content: '你好呀，感恩遇见\n\n先送你一份见面礼 🎁：这是我花了整整一个月时间，边做边打磨写出来的资料。\n\n里面都是我做自媒体搞钱搞流量和播客私教、帮大家把专业变现的核心方法，很多都是外面花钱都学不到的。\n\n这份资料能帮你在自媒体搞钱上少走很多弯路，我建议你一定要认真看完。\n\n等你读完后写一份小小的复盘（感悟、收获都行），发给我，我会再送你一份额外的福利～', useCount: 0, rate: 0 },
    { id: 1121, product: '播客私教', stage: '建立连接', label: '你好，我是当小时，播客《搞钱搞流量》…', content: '你好，我是当小时，播客《搞钱搞流量》的主理人，做自媒体12年了。\n\n我现在主要帮上节目的嘉宾推广他们的知识付费产品，自己也有提供【播客私教】的相关服务，你是对哪期嘉宾的产品感兴趣还是对播客感兴趣呀？\n\n这是我的自我介绍', useCount: 0, rate: 0 },
    { id: 1122, product: '播客私教', stage: '建立连接', label: '粥老师直播间来的朋友吗？你好呀 感恩…', content: '粥老师直播间来的朋友吗？你好呀 感恩遇见\n\n哈哈 是什么原因对我的播客感兴趣呀\n\n当然了我是靠谱的梁家人呀[奸笑]你也是吗？\n\n哈哈，星辰会的同学你好呀\n\n🤝 你也是销冠群的姐妹吗\n\n哈哈 销冠姐妹好！\n\n我很眼熟你头像\n\n漂亮美女', useCount: 0, rate: 0 },
    { id: 1123, product: '播客私教', stage: '建立连接', label: '为什么对播客感兴趣呀？', content: '为什么对播客感兴趣呀？\n\n哈哈，我看你也很信吸引力法则啊\n\n为什么对小金刚感兴趣呀\n\n你为什么对播客感兴趣呀\n\n是什么原因对播客感兴趣呀，你也是做ip还是自媒体相关的吗？\n\n是什么原因对播客感兴趣呀，是想拓展新的渠道，还是想要引流获客呀\n\n哈哈 大佬你是什么原因对播客感兴趣呀\n\n你是想做一档自己的播客吗？业务需求还是爱好呀', useCount: 0, rate: 0 },
    { id: 1124, product: '播客私教', stage: '建立连接', label: '不介意的话可以说说你现在的进展大概到…', content: '不介意的话可以说说你现在的进展大概到什么阶段了?\n比如说 之前做过那些自媒体和副业？ 知识付费过哪些课程？\n我来帮你判断一下播客适不适合你呀！\n\n连接上就是缘分，不介意的话可以说说你做什么业务或者有什么需要搞钱搞流量的赋能呀\n\n连接上就是缘分，不介意的话可以说说你做什么业务或者有什么需要播客搞钱搞流量的赋能呀\n\n哈哈 连接上就是缘分，不介意的话可以说说你做什么业务呀', useCount: 0, rate: 0 },
    { id: 1125, product: '播客私教', stage: '建立连接', label: '看到你的视频号啦 你是做科学运动的对…', content: '看到你的视频号啦 你是做科学运动的对吗 线下店想要通过自媒体线上引流获客吗\n\n你们之前流量从哪里来呀？是老客户转介绍还是有做线上自媒体呀？\n\n欧同学你们现在流量从哪里来呀？是老客户转介绍还是有做线上自媒体呀？\n\n🤝咖啡豆是你们投的产业还是\n\n你是副业做还是主页呀\n\n主业是做什么的呀\n\n你是运营工作人员还是自己的店呀\n\n你是全职做这个还是兼职呀？', useCount: 0, rate: 0 },
    { id: 1126, product: '播客私教', stage: '建立连接', label: '牛哇！十年了 这么专业的老师', content: '牛哇！十年了 这么专业的老师\n\n学霸！的老师！牛\n\n你这个赛道在播客上可好做了，尤其是还有留学成分的加持，异国生活啥的，在播客上面受众很多，而且你这个变现算是高客单，动辄就6位数，你要来一起变现不？\n\n太专业了\n\n做过实体的姐妹都是狠人', useCount: 0, rate: 0 },
    { id: 1127, product: '播客私教', stage: '建立连接', label: '你有这个意识很好呀', content: '你有这个意识很好呀\n\n像咱们这样敢于改变，想要改变的人，一定能越来越好[强]\n\n你有这个意识特别好呀！\n\n没错呀 天选人 感觉你非常有做播客的潜力hhh\n\n你有这个意识特别好哇\n\nhhh你有这些意识非常好呀\n\n哇塞你理解的也太好了吧 确实是这样的 还是得专一点hhh\n\n哇塞你写的也太好了吧\n\n你的理解很到位呀\n\n都是目光长远的人哈哈哈 播客的复利性很强', useCount: 0, rate: 0 },
    { id: 1128, product: '播客私教', stage: '最后成交', label: '咱们生日分享会里也会分享播客搞钱的干…', content: '咱们生日分享会里也会分享播客搞钱的干货，这几天可以听一听分享呀\n\n也欢迎你有启发了来找我聊聊 陪你一起搞钱搞流量\n\n我马上就要开生日分享会了，我会分享很多关于播客的搞钱干货，咱们可以进群来听呀，这是二维码，直接扫码就能约直播了\n\n我马上要开我的播课生日分享会啦，会分享播客如何搞钱，你已经在我们群里啦 你可以在这几天听一下分享呀', useCount: 0, rate: 0 },
    { id: 1129, product: '播客私教', stage: '最后成交', label: '#公众号：当小时', content: '#公众号：当小时\n播客：https://88888888.podcast.xyz/\n你可以先看看资料和公众号跟我的播客，听听我们8号会开始的公开课，有一个了解期待后续深度链接呀\n\n然后我给你推一下小金刚老师和人格解析老师的名片，你可以链接一下', useCount: 0, rate: 0 },
    { id: 1130, product: '播客私教', stage: '建立连接', label: '这两天公开课感觉怎么样呀？有没有什么…', content: '这两天公开课感觉怎么样呀？有没有什么启发呀\n\n昨天听直播感觉怎么样呀？\n\n你进播客公开课了吗\n\n你这两天公开课感觉怎么样呀？\n\n你是在直播间吗', useCount: 0, rate: 0 },
    { id: 1131, product: '播客私教', stage: '建立连接', label: '那你能够做视频号变现说明已经有一些基…', content: '那你能够做视频号变现说明已经有一些基础了，为什么没有继续再做呢？\n\n万粉进行时hhh带大家把播客做起来\n\n你们是要招商加盟吗？\n\n你目前疼痛理疗馆和证券行业是更着急解决那一块的引流变现问题呢', useCount: 0, rate: 0 },
    { id: 1132, product: '播客私教', stage: '建立连接', label: '引流变现效果怎么样呀？ 我只看到一个…', content: '引流变现效果怎么样呀？ 我只看到一个非常低客单价的读书会？\n\n那你之前的副业和自媒体拿到什么结果吗？\n\n效果咋样呀 线上投放\n\n投流成本应该越来越贵了吧\n\n你自己有做节目想要商业化吗？还是坐着玩玩呀？\n\n你是自己靠录制接单变现吗\n\n你主要变现的产品是什么呀？\n\n了解你是主要卖货吗？还是有招代理的需求？', useCount: 0, rate: 0 },
    { id: 1133, product: '播客私教', stage: '建立连接', label: '宝，约我播客录制目前我只提供给我的私…', content: '宝，约我播客录制目前我只提供给我的私教学员，咱们如果想和我连麦或者约我做播客，看看要不要考虑加入我的私教？', useCount: 0, rate: 0 },
    { id: 1134, product: '播客私教', stage: '最后成交', label: '我有一个按地域的免费听友群，今天会有…', content: '我有一个按地域的免费听友群，今天会有播客搞钱生日分享会，感兴趣的话欢迎扫码进来玩～\n\n这是我在生财写的精华帖～\n\n期待后续有缘深度链接呀\n\n对的 你可以听听我和靠谱老师8号的直播', useCount: 0, rate: 0 },
    { id: 1135, product: '播客私教', stage: '建立连接', label: '没错，项目的变动是很大的。咱们能够在…', content: '没错，项目的变动是很大的。咱们能够在视频号上赚到六万说明无论我们的执行力还是学习能力都非常强！\n像视频号这样的项目，一方面废号，另一方面你可能需要很多个账号，很多部手机，但是如果想做播客，做一个自己的账号，能卖自己的产品，那就是一个手机一个账号就能赚钱，也不耽误咱们带孩子。咱们已经看到了播客的红利，眼光真的非常敏锐，咱们现在想要做一个自己的播客账号吗？', useCount: 0, rate: 0 },
    { id: 1136, product: '播客私教', stage: '建立连接', label: '我发现咱们的能力非常多呀，特别有上进…', content: '我发现咱们的能力非常多呀，特别有上进心！但为什么一直没赚到钱呢，是因为你一直在学技术，而没有搞明白赚钱的底层逻辑。其实想要赚钱就是一个卖字。\n\n我们现在技能是完全没有问题了就是怎么能够把自己的技术，包装成服务或者产品卖出去。 播客就是一个帮咱们把我们的服务产品卖出去的渠道，而且相比其他平台的卷，他现在还是蓝海，还在一个早期爆发期，你目前有布局播客的想法吗？或者是想了解播客是怎么搞钱的吗', useCount: 0, rate: 0 },
    { id: 1137, product: '播客私教', stage: '建立连接', label: '那确实是需要再多一些引流，那只靠老客…', content: '那确实是需要再多一些引流，那只靠老客户转介绍肯定会枯竭\n那这个获客效率确实不高，我有很好的朋友就是在美团做医美用增的，医美内容本身就敏感，你自己应该有感觉小红书医美已经卷生卷死了，大机构动不动就是砸钱干流量，当然我们不能这么干，还是要考虑投产比对不？', useCount: 0, rate: 0 },
    { id: 1138, product: '播客私教', stage: '挖掘需求', label: '对的，大健康和证券在公域都是属于敏感…', content: '对的，大健康和证券在公域都是属于敏感的赛道，引流难还容易封号。但这两个行业也属于高利润赛道，天花板特别高，解决了流量，你赚的至少是现在的3倍。\n\n因为像你不管是疼痛属于医疗方面的还是证券开户属于金融赛道的，这两个在其他平台都被监管得很严重\n\nk12在公域限流，但是在私域不会', useCount: 0, rate: 0 },
    { id: 1139, product: '播客私教', stage: '挖掘需求', label: '那也太可惜了吧，你们这个流量如果商业…', content: '那也太可惜了吧，你们这个流量如果商业化做得好的话， 每个月多个几万块，应该都是很正常的\n\n你们如果要做的话，其实蛮简单的，也不用自己 做交付可以跟我一样，先从渠道做起。\n\n我的播客是这里面也有专门招怎么样去分销别人的产品， 去年我光是卖嘉宾的产品一个月就能卖100,000啦， 到手的提成也不少呢，而且我们流量都还没有你好，看你想不想要 走这条路？', useCount: 0, rate: 0 },
    { id: 1140, product: '播客私教', stage: '解决顾虑', label: '动力不够说明你缺乏刺激，大家都想改变…', content: '动力不够说明你缺乏刺激，大家都想改变，但是为什么有些人真正改变了，有些人却一直原地踏步？因为真正改变的人会借势，当自律不够的时候会用圈子来用他律刺激自己，刺激着刺激着就变厉害了，对不？', useCount: 0, rate: 0 },
    { id: 1141, product: '播客私教', stage: '挖掘需求', label: '播客主打的是一个声音陪伴 ，你看 ，…', content: '播客主打的是一个声音陪伴 ，你看 ，通勤的路上， 健身房的路上 ，夜深人静的时刻，刷视频不一定方便，但咱们都是可以打开小宇宙 喜马拉雅来直接听播客的\n\n而且视频很多都是比较短的 ，咱们播客是用自己的声音去陪伴听众半个小时及以上的，大家的信任感肯定是会很好的 黏性很强', useCount: 0, rate: 0 },
    { id: 1142, product: '播客私教', stage: '挖掘需求', label: '对，公域太卷了，趁早来干播客吧哈哈哈…', content: '对，公域太卷了，趁早来干播客吧哈哈哈哈哈真心推荐，我真的给很多行业都做过流量诊断，文化产业赛道，做公域不如做播客\n\n公域，泛粉，不付钱不成交，要来干嘛呢？你想听播客的都是什么样的人，是不是高认知、有高付费能力，素质更高，所以在播客平台，教育、文化赛道一定会爆发的。', useCount: 0, rate: 0 },
    { id: 1143, product: '播客私教', stage: '挖掘需求', label: '英语提分6月是最旺的旺季啊，我建议赶…', content: '英语提分6月是最旺的旺季啊，我建议赶紧做起来\n\n现在5月，678月是流量爆发大旺季，现在做播客，把这波流量都吃下来，你想要出成绩会特别快。', useCount: 0, rate: 0 },
    { id: 1144, product: '播客私教', stage: '建立连接', label: '我觉得是可以换换打法的', content: '我觉得是可以换换打法的\n\n1q多条，你们发了多久呀', useCount: 0, rate: 0 },
    { id: 1145, product: '播客私教', stage: '建立连接', label: '我这边就有在香港做金融保险的学员，做…', content: '我这边就有在香港做金融保险的学员，做播客，一期引流很多人咨询。\n还有做中医的老师也有案例。\n\n那很好呀，我觉得中医是非常适合的，我们之前也有 做过中医的案例，后面有好多人加过来找他呢\n\n这是他给我的咨询复盘，你看一下有没有什么启发呀\n\n这个是香港保险的案例↑\n\n来得早，不如来得巧你看这是你想要达到的结果不？你觉得OK我来给你介绍播客私教的权益，刚好明天就要涨价啦，还卡上了最优惠的尾巴[呲牙]', useCount: 0, rate: 0 },
    { id: 1146, product: '播客私教', stage: '建立连接', label: '大牙是播客私教的学员，这次是我找我的…', content: '大牙是播客私教的学员，这次是我找我的学员们来操盘的\n\n操盘手们都很看好播客这个渠道[偷笑]，你有没有兴趣发展播客的想法呀？\n\n今天还有一位财务老师也进了我们的播客呢，你要不要来跟他一起做一个搭子？\n\n这是刚刚加入的财务老师⬆️包括静水老师前几天也已经加入了\n\n现在加入的已经有两个小红书官方合作的讲师了\n\n还有很多自媒体的大佬，你想想你能跟他们做同学还能一起录播客\n\n这些都是你的互联网人脉呢', useCount: 0, rate: 0 },
    { id: 1147, product: '播客私教', stage: '挖掘需求', label: '我最快的案例就是录制当场就转钱的，而…', content: '我最快的案例就是录制当场就转钱的，而且是在5000以上的单价\n这两天忙公开课去了哈哈。那太好了，咱们有没有兴趣来和我约录播客呀哈哈哈，我这边和嘉宾录制的播客，每一期带来的流量超级精准，美业赛道的老板第一次录就卖了五位数哈哈哈', useCount: 0, rate: 0 },
    { id: 1148, product: '播客私教', stage: '挖掘需求', label: '笑鼠，我知道，因为每次有做玄学水晶的…', content: '笑鼠，我知道，因为每次有做玄学水晶的老板跟我咨询，我就会拿你这个案例举例，虽然不是我做的吧，但是我听说了我就拿来用了，哈哈哈！\n\n大佬实力太强，光芒万丈遮不住的哈哈哈\n\n这就是业务做的好的大佬吗？\n\n还没有做播客的想法就已经吃到红利了哈哈哈，这次我的生日会也会分享很多关于播客的干货，欢迎虎牙总来围观呀！', useCount: 0, rate: 0 },
    { id: 1149, product: '播客私教', stage: '挖掘需求', label: '是的，我们 播客也是有和生财在合作，…', content: '是的，我们 播客也是有和生财在合作，每个月都会有转化你自己录一些什么呀？\n\n喜马拉雅也在转型，他不是狭义理解的播客，我最近才去了他们总部， 也跟他们合作出了一个单口的付费VIP专辑，他们现在也非常需要优秀的播客内容， 还在跟我谈，让我做制片帮他们挖掘一些优秀的播客主', useCount: 0, rate: 0 },
    { id: 1150, product: '播客私教', stage: '挖掘需求', label: '职场咨询很合适呀', content: '职场咨询很合适呀\n\n命理这块走播客很不错呀！\n\n这个赛道很好哇\n\n哈哈 那很合适呀 疗愈是播客的天选载体\n\n越是冷门越适合用播客呀\n\n我们做过这样子的案例，当时是有二30个人加过来问他怎么学习\n\n她不是卖线下门店，是做个人ip，收普拉提教学的教练学员\n\n你这么专业做了十年了 我觉得是很适合来做线上自媒体或播客来搞钱的\n\n等你做起了来不仅可以做自己 还能赋能你的同行', useCount: 0, rate: 0 },
    { id: 1151, product: '播客私教', stage: '挖掘需求', label: '你小红书能做起来内容能力很强呀，转来…', content: '你小红书能做起来内容能力很强呀，转来做播客应该也是非常容易起来的\n\n我看你朋友圈很专业呀\n\n哇，你的内容创作能力也还不错耶，如果公众号都可以做的话，播客其实会效果更好\n\n哇，太厉害了吧，有两个宝宝还要同时做这么多事，真是不容易呢\n\n你们的订阅量还挺高的呀，那我看了你的 朋友圈内容制作能力是没问题的\n\n哇，那你也是很资深的高质量用户了呀', useCount: 0, rate: 0 },
    { id: 1152, product: '播客私教', stage: '挖掘需求', label: '你执行力应该不错的！！', content: '你执行力应该不错的！！\n\n那很不错呀 已经跑通从0到1了\n\n你现在身上有不少技能，执行力和学习能力绝对够强！把播客的赚钱流程搞明白，跟着有结果的老师走，听话照做，一定也能出结果。', useCount: 0, rate: 0 },
    { id: 1153, product: '播客私教', stage: '建立连接', label: '谢谢文姐邀约呀哈哈 目前我的重心还是…', content: '谢谢文姐邀约呀哈哈 目前我的重心还是在播客私教案例打造和交付上，等沉淀一段时间下半年做第二次发售前如果有需求我来找你呀[爱心]\n\n嗯嗯，后续有需求一定找你，另外现在发售期间我们学员分销的cps是50%如果文姐有兴趣做播客也非常欢迎你来绑定。\n\n相当于之前的两单的的cps就是4000已经把学费赚回来了\n\n好哇[呲牙]以后有机会在深度绑定', useCount: 0, rate: 0 },
    { id: 1154, product: '播客私教', stage: '挖掘需求', label: '小宇宙是因为你刚进去，他们的算法还没…', content: '小宇宙是因为你刚进去，他们的算法还没有了解你的使用习惯 和爱听的内容，所以推荐系统需要养成一段时间\n\n对呀 ， 所以为什么我说播客是一个蓝海，因为听的人 多入局的人很少\n\n对呀，那再适合不过了，播客不仅听的时候不费眼睛，自己做录的时候也不需要一直对着电脑屏幕，而且有时候和朋友聊天就把内容做了', useCount: 0, rate: 0 },
    { id: 1155, product: '播客私教', stage: '挖掘需求', label: '那我们已经是走过一轮商业变现的路径了…', content: '那我们已经是走过一轮商业变现的路径了，基础认知很好呀，赚到钱应该不是难事。如果你想做自媒体，现在其他平台都很卷，播客是在蓝海红利期的赛道，你有布局自己播课的想法吗？\n\n播客真的是蓝海，就像18年的抖音，20年的小红书，现在趁早，趁好入局，占住播客财会这个生态位，未来业绩和影响力，一定是指数级别增长。\n\n播客其实现在就相当于18年的抖音，20年的小红书，我们现在入局播客，就是早占领蓝海，咱们是做过实体的肯定明白早就是优势，早就赚，对吧。\n\n播客这个渠道就像18年的抖音，20年的小红书，这个蓝海真的要趁早占领，现在占住播客的生态位，很大概率会影响咱们未来在行业里的生态位，解决流量搞定业绩嘛，你认可不？', useCount: 0, rate: 0 },
    { id: 1156, product: '播客私教', stage: '挖掘需求', label: '播客的用户特备优质，客单价也高，两位…', content: '播客的用户特备优质，客单价也高，两位数播放吸引来的用户成交4位数5位数没有一点问题，我自己26万的大客户也是从播客来的\n\n那很适合用播客去做呀， 因为我看你大部分客户都代理都是宝妈吧，他们其实听东西的时间会比看文章要多得多，因为可以一边带孩子一边做家务的时候收听', useCount: 0, rate: 0 },
    { id: 1157, product: '播客私教', stage: '挖掘需求', label: '播客跟其他的自媒体不一样的是，它是r…', content: '播客跟其他的自媒体不一样的是，它是rss自动同步的， 你在一个平台发，它可以在十几个平台同步就不上公众号也要发一遍，小红书发一遍视频号再重新发一遍。\n\n比如说我在喜马拉雅上面发布后小宇宙，网易云，荔枝，苹果播客等等都是自动同步的， 时间效率上面是非常高效的，不会像其他平台一样，最后成了赛博佃农，都是被平台打工的，做播客粉丝就是自己的', useCount: 0, rate: 0 },
    { id: 1158, product: '播客私教', stage: '挖掘需求', label: '播客一期就是30、40分钟，而且是搜…', content: '播客一期就是30、40分钟，而且是搜索逻辑，来听的一个是肯定有意向，一个播客平台大家付费能力都很高。\n\n你看 主流的媒体频道你搜索都能找到我们\n\n播客是一个内容媒介就是声音，作为内容跟图文短视频是一样的', useCount: 0, rate: 0 },
    { id: 1159, product: '播客私教', stage: '挖掘需求', label: '其实你可以考虑一下做播客，因为他对供…', content: '其实你可以考虑一下做播客，因为他对供应其他平台的素材会特别有效率， 因为可以 分发\n\n花不了多少时间，而且如果你本来要写公众号和其他的内容，包括朋友圈之类的一条播客聊一个小时就可以生成几万字的逐字稿，再用AI我会教你们转成10篇公众号20条朋友圈的内容啦\n\n相当于你投入自媒体内容上的时间不会变多，反而会减少呢', useCount: 0, rate: 0 },
    { id: 1160, product: '播客私教', stage: '挖掘需求', label: '疗愈太适合做播客了。我真的特别多学员…', content: '疗愈太适合做播客了。我真的特别多学员都是疗愈赛道的。我们疗愈最难的事情，是不是怎么让用户搞清楚我们是做什么的，怎么能帮助到他们，对不对？做公域你想想，时长太长，用户听不下去，太短，讲不清楚，播客就完美搞定这个问题。\n\n你平时有听播客吗？我看上面已经有很多，你们同行在布局了这种高客单解释成本又高是非常适合用播客来做的\n\n流量也很好不像头流一样，在讲故事的过程中把自己的服务给植入了', useCount: 0, rate: 0 },
    { id: 1161, product: '播客私教', stage: '挖掘需求', label: '那播客可以满足吸引到精准客资联系的问…', content: '那播客可以满足吸引到精准客资联系的问题 包括招商加盟也很合适，而且现在是蓝海还没有怎么内容监管看你想不想要提前入局抢占先机了\n\n播客就是做医美投产比最高的一个赛道，我朋友和我说现在医美的引流重心，尤其是中小机构都在向播客转移，你的市场嗅觉特别敏锐，趁很多同行还没有入场，现在早占领播客这个生态位，比一直在公域卷，用户精准，成交客单价高，这不香嘛？\n\n而且医美利润又特别高，我真的建议你赶紧做播客。', useCount: 0, rate: 0 },
    { id: 1162, product: '播客私教', stage: '挖掘需求', label: '关注不如入场，咱们太敏锐了，这么早就…', content: '关注不如入场，咱们太敏锐了，这么早就发现了播客的机会，那我们就要好好抓住，对不对，早就是优势！\n\n那太好了，我们的基础已经比很多人都强了。而且你市场嗅觉真的很敏锐，现在就是做播客最好的时候，公域平台已经卷出天际了，播客真的是蓝海', useCount: 0, rate: 0 },
    { id: 1163, product: '播客私教', stage: '挖掘需求', label: '疗愈这个赛道本来就赚钱，如果一年搞不…', content: '疗愈这个赛道本来就赚钱，如果一年搞不到50个，一定要做播客，播客一个客单价就能上万。\n\n泛流量没用，搞定精准的流量，卖高客单，除了卖书还能卖课，对不？\n\n我们都知道，搞定流量就能搞定业绩，对不？但你看现在公域，卷生卷死，阅读即便上万上十万，能给你付钱的用户，都寥寥无几，对吧，我们也能感受到。但播客2位数播放，就能吸引来直接付款5位数的客户，这样的例子在小时这里太多了。\n\n英语提分赛道，真的是教育赛道中的赚钱头部。', useCount: 0, rate: 0 },
    { id: 1164, product: '播客私教', stage: '挖掘需求', label: '我这边医美的学员成绩真的很牛，哈哈哈…', content: '我这边医美的学员成绩真的很牛，哈哈哈最近又来了好几个医美赛道的，犹豫真的会败北，哈哈哈哈明天就涨价了，真的错过这个机会太可惜了，反正医美是一定会发展播客的，晚干不如早干\n\n我觉得是最合适的是把星辰会的内容的学习路程播客分销\n\n一边学了还一边卖，因为卖是最好的学，哈哈哈', useCount: 0, rate: 0 },
    { id: 1165, product: '播客私教', stage: '挖掘需求', label: '没问题，播客就是一个特别能满足咱们的…', content: '没问题，播客就是一个特别能满足咱们的分享欲的渠道！有很多不合适在视频直播上说的，我们通过播客就能唠，可能玩着玩着就变成百万大V了[奸笑]\n\n而且播客的可塑性特被强，能搞事情的方向特别多，小时也会带着大家去多多搞事，把我们都打造成播客明星！\n\n要不要来和小时学播客？我已经看到一个新星冉冉升起了[奸笑]', useCount: 0, rate: 0 },
    { id: 1166, product: '播客私教', stage: '挖掘需求', label: '咱们绑定我不止能学播客赚钱，还能一劳…', content: '咱们绑定我不止能学播客赚钱，还能一劳永逸，拥有我的人脉资源，要不要和小时绑定终身呀[奸笑]\n\n你也可以把我当成超级人脉节点，你想要和哪些实体或者行业合作，我这边都可以帮你攒局。\n\n人脉资源、经验比课程更值钱，对不？', useCount: 0, rate: 0 },
    { id: 1167, product: '播客私教', stage: '挖掘需求', label: '我的播客私教里也有很多像咱们这样的学…', content: '我的播客私教里也有很多像咱们这样的学员，我会先帮我们梳理目前的情况，帮我们搞定要卖什么产品。\n\n其实现在能赚到钱的是综合能力强的全才，而不是专才。所以你走的每一步都算数，都不白走，这也是你的优势。普通人想赚到钱，一定要懂得抓红利，改变临门一脚开始的，你觉得我说的对吗？\n\n没错呀 咱们终究是得要找好自己的定位，想好卖什么产品，对吧？那我给你说一下我的私教权益，和你说说要怎么帮你开启播客搞钱？', useCount: 0, rate: 0 },
    { id: 1168, product: '播客私教', stage: '挖掘需求', label: '其实像你在国外，如果只是照顾小孩，没…', content: '其实像你在国外，如果只是照顾小孩，没有自己的精神生活也挺无聊的\n\n可以把播客当作一种爱好和表达的一种途径是特别合适你的\n\n等你做了一段时间之后，说不定就能够探索出来适合自己的路径和产品\n\n因为我相信你现在生活物质应该也都蛮好的，也没有那么着急去变现对吧所以播客他作为一个比较慢节奏的平台，是最适合你去入局的啦', useCount: 0, rate: 0 },
    { id: 1169, product: '播客私教', stage: '解决顾虑', label: '这也是为什么你要跟着我来学。沟通是得…', content: '这也是为什么你要跟着我来学。沟通是得靠练的，你听了这么多天直播，把你炼成像我一样的表达能力，你觉得好不？\n\n咱们其实是很心动播客这个精准渠道的，但是对自己的沟通表达，和怎么输出播客的内容，心里没有底，对不对？\n\n来了就是带你练输出的呀～', useCount: 0, rate: 0 },
    { id: 1170, product: '播客私教', stage: '解决顾虑', label: '没关系，你来了我的播客私教，我会手把…', content: '没关系，你来了我的播客私教，我会手把手带着你做，包括你录制什么音频，然后怎么样录制，怎么样剪辑，邀请谁，邀请嘉宾连麦。聊天录直播课的时候，聊什么这些我都是手把手教你的。你来了之后，咱们都是贴身服务，不用担心不会做。\n\n来了之后我会先帮你梳理一下商业定位，看你适合做什么样的内容\n\n有的人是擅长做单口输出，有的人是适合两个人对谈', useCount: 0, rate: 0 },
    { id: 1171, product: '播客私教', stage: '解决顾虑', label: '当然可以啦！首先，我要给你信心，无论…', content: '当然可以啦！首先，我要给你信心，无论是找自己的兴趣爱好，还是给家庭增加收入，都是上进心的体现！你要有有自信，你来绑定当当，我会推着你往前走，改变都是从想干到决定干，最后干成的。\n\n第二，你给我的这些话里，逻辑很清楚，也特别亲和，你绝对是有表达能力的，不要妄自菲薄。表达和内容，小时在私教里设置了训练计划，咱们干中学，干中练', useCount: 0, rate: 0 },
    { id: 1172, product: '播客私教', stage: '解决顾虑', label: '小时的一个学员也和你一样，刚开始总怕…', content: '小时的一个学员也和你一样，刚开始总怕自己做不好，没结果，干起来以后， 听到自己的作品，不仅很有成就感，分销也实现了大几千，这是不是你想要的？你也可以。\n\n对呀，那你不来做播客真的太可惜了！我带了很多学员，像你这样表达和共情都不错的挺少见的，我又能多一个优秀学员案例了，快来快来', useCount: 0, rate: 0 },
    { id: 1173, product: '播客私教', stage: '挖掘需求', label: '播客的听众质量都很高，付费能力也很强…', content: '播客的听众质量都很高，付费能力也很强，比短视频平台的人素质更高，更加礼貌，像短视频那种纠纷播客基本不会出现，所以我们可以放心。\n\n我知道你很想走出改变这一步，但你会怀疑自己，没关系，加入私教以后，我会做推着你走的人，给你能量，让我们一起变得更好！你觉得这样好不好？', useCount: 0, rate: 0 },
    { id: 1174, product: '播客私教', stage: '解决顾虑', label: '我知道你担心的自己的精力，没办法马上…', content: '我知道你担心的自己的精力，没办法马上开始，当当开始做播客和你情况挺相似的，我是在孕晚期开始做播客的，还记不记的我在直播间说，做播客没有什么压力，你要把播客当做一个与人交流沟通的日常来做，我就是这样更新到200期的。你也可以。\n\n我们买产品，除了买课程本身，还有就是连接人打造自己的人脉圈子对不对，咱们关注我这么久，我知道你一定是很认可当当，和当当一样同频高能量的人！', useCount: 0, rate: 0 },
    { id: 1175, product: '播客私教', stage: '解决顾虑', label: '一定要跟上小时的节奏，完成任务，执行…', content: '一定要跟上小时的节奏，完成任务，执行力到位，对你自己有没有信心呀？\n\n你是担心人多了交付不过来的问题吗 其实你可以反过来想想这些加入的同学，他们都是你的资源呢。', useCount: 0, rate: 0 },
    { id: 1176, product: '播客私教', stage: '解决顾虑', label: '一样的 因为我们后续还会举办线下听友…', content: '一样的 因为我们后续还会举办线下听友会 分地区方便开展\n\n我的生日分享会也拉拉宝，咱们可以在里面学习播客搞钱的干货呀，为我们日后播客搞钱做铺垫！\n\n权益二的圆桌会现在已经在约了，你现在进的话刚好还能约上\n\n除此之外也有涉及到表达沟通的训练营', useCount: 0, rate: 0 },
    { id: 1177, product: '播客私教', stage: '解决顾虑', label: '播客的节奏还是比较慢的', content: '播客的节奏还是比较慢的\n\n太着急了，心态不好，容易动作变形\n\n如果是这么着急的话，可能上小红书和短视频这样的平台比较适合', useCount: 0, rate: 0 },
    { id: 1178, product: '播客私教', stage: '解决顾虑', label: '为什么不付全款呢？是有什么考虑呢？', content: '为什么不付全款呢？是有什么考虑呢？\n\n负债吗？如果负债的话，那就还是先还清了再来。\n\nemm， 会影响你的生活吗？会的话我还是建议你还清了再来吧，\n\n嗯嗯 我是建议你考虑再来哈~\n\n为什么不全款呢？是什么考虑呢？', useCount: 0, rate: 0 },

// ── 渲染：产品树 ──
function renderTree() {
  const tree = document.getElementById('product-tree');
  tree.innerHTML = '';

  PRODUCTS.forEach(product => {
    const scripts = data.scripts.filter(s => s.product === product);
    const totalCount = scripts.length;

    const item = document.createElement('div');
    item.className = 'product-item';

    const header = document.createElement('div');
    header.className = 'product-header' +
      (selectedProduct === product ? ' active' : '') +
      (selectedProduct === product ? ' open' : '');
    header.innerHTML = `
      <span class="icon">${PRODUCT_ICONS[product]}</span>
      <span class="name">${product}</span>
      <span class="total">${totalCount}</span>
      <span class="chevron">▶</span>
    `;

    const stageList = document.createElement('div');
    stageList.className = 'stage-list' + (selectedProduct === product ? ' open' : '');

    STAGES.forEach(stage => {
      const count = scripts.filter(s => s.stage === stage).length;
      const si = document.createElement('div');
      si.className = 'stage-item' + (selectedProduct === product && selectedStage === stage ? ' active' : '');
      si.innerHTML = `
        <span class="s-icon">${STAGE_ICONS[stage]}</span>
        <span class="s-name">${stage}</span>
        <span class="s-count">${count || ''}</span>
      `;
      si.onclick = (e) => {
        e.stopPropagation();
        selectedProduct = product;
        selectedStage = stage;
        renderTree();
        renderCards();
        updateMidLabel();
        updateRecs();
      };
      stageList.appendChild(si);
    });

    header.onclick = () => {
      if (selectedProduct === product) {
        selectedProduct = null;
        selectedStage = null;
      } else {
        selectedProduct = product;
        selectedStage = null;
      }
      renderTree();
      renderCards();
      updateMidLabel();
      updateRecs();
    };

    item.appendChild(header);
    item.appendChild(stageList);
    tree.appendChild(item);
  });
}

// ── 渲染：话术卡片 ──
function renderCards() {
  const container = document.getElementById('scriptCards');
  let scripts = data.scripts;

  if (searchQuery) {
    scripts = scripts.filter(s => s.content.includes(searchQuery));
  } else if (selectedProduct && selectedStage) {
    scripts = scripts.filter(s => s.product === selectedProduct && s.stage === selectedStage);
  } else if (selectedProduct) {
    scripts = scripts.filter(s => s.product === selectedProduct);
  }

  container.innerHTML = '';

  if (!scripts.length) {
    container.innerHTML = `
      <div class="empty-state">
        <div class="e-icon">📭</div>
        <div>${searchQuery ? '没有匹配的话术' : '这里还没有话术'}</div>
        ${!searchQuery ? `<div class="e-btn" onclick="openModal()">＋ 添加第一条话术</div>` : ''}
      </div>
    `;
    return;
  }

  scripts.forEach(s => {
    const card = document.createElement('div');
    card.className = 'script-card';
    card.id = `card-${s.id}`;

    const isLong = s.content.length > 120;
    const preview = isLong ? s.content.slice(0, 120) + '...' : s.content;

    card.innerHTML = `
      <div class="card-tags">
        <span class="tag stage-tag">${STAGE_ICONS[s.stage] || ''} ${s.stage}</span>
        <span class="tag product-tag">${s.product}</span>
        ${s.label ? `<span class="tag" style="color:#505050;">${s.label}</span>` : ''}
      </div>
      <div class="card-content" id="content-${s.id}">${escHtml(preview)}</div>
      ${isLong ? `<div class="card-expand" onclick="toggleExpand(${s.id})">展开 ▾</div>` : ''}
      <div class="card-footer">
        <div class="card-stats">
          <span>使用 ${s.useCount} 次</span>
          ${s.rate ? `<span>成交率 ${s.rate}%</span>` : ''}
        </div>
        <button class="btn-delete" onclick="deleteScript(${s.id})" title="删除">🗑</button>
        <button class="btn-edit" onclick="openModal(${s.id})">✏️ 编辑</button>
        <button class="btn-shoot" onclick="shootScript(${s.id})">🏹 射出去</button>
      </div>
    `;
    container.appendChild(card);
  });
}

function toggleExpand(id) {
  const s = data.scripts.find(x => x.id === id);
  if (!s) return;
  const el = document.getElementById(`content-${id}`);
  const expandBtn = el.nextElementSibling;
  if (el.classList.contains('expanded')) {
    el.classList.remove('expanded');
    el.innerHTML = escHtml(s.content.slice(0, 120) + '...');
    if (expandBtn) expandBtn.textContent = '展开 ▾';
  } else {
    el.classList.add('expanded');
    el.innerHTML = escHtml(s.content);
    if (expandBtn) expandBtn.textContent = '收起 ▴';
  }
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── 更新中栏标题 ──
function updateMidLabel() {
  const el = document.getElementById('midLabel');
  if (selectedProduct && selectedStage) {
    el.textContent = `${PRODUCT_ICONS[selectedProduct]} ${selectedProduct} · ${STAGE_ICONS[selectedStage]} ${selectedStage}`;
  } else if (selectedProduct) {
    el.textContent = `${PRODUCT_ICONS[selectedProduct]} ${selectedProduct}`;
  } else if (searchQuery) {
    el.textContent = `🔍 搜索：「${searchQuery}」`;
  } else {
    el.textContent = '全部话术';
  }
}

// ── AI推荐 ──
function updateRecs() {
  // 读取 chat.html 设置的当前客户上下文
  let ctx = {};
  try { ctx = JSON.parse(localStorage.getItem('gh_chat_context') || '{}'); } catch(e) {}

  const customer = ctx.name || '—';
  const product = ctx.product || selectedProduct || '播客私教';
  const stage = ctx.stage || selectedStage || '解决顾虑';

  document.getElementById('ctxCustomer').textContent = customer;
  document.getElementById('ctxProduct').textContent = product;
  document.getElementById('ctxStage').textContent = stage;

  // 取该产品+阶段的话术，按useCount排序
  let pool = data.scripts.filter(s => s.product === product && s.stage === stage);
  if (!pool.length) pool = data.scripts.filter(s => s.stage === stage);
  if (!pool.length) pool = data.scripts.slice(0, 3);

  pool = [...pool].sort((a, b) => (b.rate || 0) - (a.rate || 0) || b.useCount - a.useCount);
  const top3 = pool.slice(0, 3);

  const container = document.getElementById('recCards');
  container.innerHTML = '';

  if (!top3.length) {
    container.innerHTML = '<div style="padding:12px 14px;font-size:11px;color:#404040;">当前分类暂无话术</div>';
    return;
  }

  top3.forEach((s, i) => {
    const card = document.createElement('div');
    card.className = 'rec-card' + (i === 0 ? ' best' : '');
    const preview = s.content.length > 80 ? s.content.slice(0, 80) + '...' : s.content;
    const metaText = i === 0
      ? `⭐ 最佳匹配 · 成交率 ${s.rate || '—'}%`
      : `成交率 ${s.rate || '—'}%  使用 ${s.useCount} 次`;
    card.innerHTML = `
      <div class="rc-meta">${metaText}</div>
      <div class="rc-content">${escHtml(preview)}</div>
      <div class="rc-actions"><button class="rc-use-btn" onclick="shootScriptById(${s.id})">使用</button></div>
    `;
    container.appendChild(card);
  });

  // 统计
  const total = data.scripts.reduce((sum, s) => sum + s.useCount, 0);
  const rated = data.scripts.filter(s => s.rate > 0);
  const avgRate = rated.length ? Math.round(rated.reduce((sum, s) => sum + s.rate, 0) / rated.length) : 0;
  const best = [...data.scripts].sort((a, b) => b.rate - a.rate)[0];

  document.getElementById('statTotal').textContent = total + ' 次';
  document.getElementById('statRate').textContent = avgRate ? avgRate + '%' : '—';
  document.getElementById('statBest').textContent = best?.rate ? best.content.slice(0, 20) + '...' : '—';
}

// ── 使用话术（复制到剪贴板）──
function shootScript(id) { shootScriptById(id); }
function shootScriptById(id) {
  const s = data.scripts.find(x => x.id === id);
  if (!s) return;
  s.useCount = (s.useCount || 0) + 1;
  saveData();
  renderCards();
  updateRecs();

  // 复制到剪贴板
  navigator.clipboard.writeText(s.content).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = s.content;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  });

  showToast('已复制 🏹');

  // 同时通知 chat.html（如果在 iframe 里）
  try {
    window.parent.postMessage({ type: 'script_selected', content: s.content }, '*');
  } catch(e) {}
}

function showToast(msg) {
  const t = document.getElementById('copiedToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

    title.textContent = '添加话术';
    fProduct.value = selectedProduct || PRODUCTS[0];
    fStage.value = selectedStage || STAGES[0];
    document.getElementById('fLabel').value = '';
    document.getElementById('fContent').value = '';
  }

  modal.classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingId = null;
}

function saveScript() {
  const product = document.getElementById('fProduct').value;
  const stage = document.getElementById('fStage').value;
  const label = document.getElementById('fLabel').value.trim();
  const content = document.getElementById('fContent').value.trim();
  if (!content) { alert('请输入话术内容'); return; }

  if (editingId) {
    const s = data.scripts.find(x => x.id === editingId);
    if (s) { s.product = product; s.stage = stage; s.label = label; s.content = content; }
  } else {
    const newId = Date.now();
    data.scripts.push({ id: newId, product, stage, label, content, useCount: 0, rate: 0 });
  }

  saveData();
  closeModal();
  renderTree();
  renderCards();
  updateRecs();
}

function deleteScript(id) {
  if (!confirm('确认删除这条话术？')) return;
  data.scripts = data.scripts.filter(s => s.id !== id);
  saveData();
  renderTree();
  renderCards();
  updateRecs();
}

// ── 快速收录 ──
function quickSave() {
  const content = document.getElementById('quickAdd').value.trim();
  if (!content) return;
  const product = selectedProduct || PRODUCTS[0];
  const stage = selectedStage || STAGES[0];
  data.scripts.push({ id: Date.now(), product, stage, content, useCount: 0, rate: 0 });
  saveData();
  document.getElementById('quickAdd').value = '';
  renderTree();
  renderCards();
  updateRecs();
  showToast('已保存到 ' + product + ' · ' + stage);
}

// ── 搜索 ──
document.getElementById('searchInput').addEventListener('input', function() {
  searchQuery = this.value.trim();
  if (searchQuery) { selectedProduct = null; selectedStage = null; }
  renderTree();
  renderCards();
  updateMidLabel();
});

// ── 暴露给 chat.html 调用 ──
window.getScripts = function(product, stage) {
  if (product && stage) return data.scripts.filter(s => s.product === product && s.stage === stage);
  if (product) return data.scripts.filter(s => s.product === product);
  return data.scripts;
};

window.getBestScript = function(product, stage) {
  const pool = data.scripts.filter(s => s.product === product && s.stage === stage);
  if (!pool.length) return null;
  return pool.sort((a, b) => (b.rate || 0) - (a.rate || 0))[0];
};

// 监听 chat.html 发来的上下文更新
window.addEventListener('storage', function(e) {
  if (e.key === 'gh_chat_context') updateRecs();
});

// 点击 overlay 关闭模态框
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── 初始化 ──
renderTree();
renderCards();
updateMidLabel();
updateRecs();

// 定时刷新右栏上下文（每2秒检查一次 chat.html 的客户切换）
setInterval(updateRecs, 2000);
</script>
</body>
</html>
