  <style>
    /* ── Products Page Layout ── */
    #page-products {
      display: flex; flex-direction: column; height: 100%;
      background: #141414; overflow: hidden;
    }

    /* Toolbar */
    #prod-toolbar {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; background: #181818;
      border-bottom: 1px solid #242424; flex-shrink: 0;
    }
    #prod-search {
      background: #222; border: 1px solid #2a2a2a; border-radius: 5px;
      color: #d0d0d0; font-size: 11px; padding: 5px 10px;
      outline: none; width: 160px;
    }
    #prod-search::placeholder { color: #484848; }
    #prod-search:focus { border-color: #444; }
    #prod-toolbar .spacer { flex: 1; }
    #btn-add-product {
      font-size: 11px; color: #f0a500; background: none; border: none;
      cursor: pointer; padding: 4px 0; letter-spacing: 0.3px;
    }
    #btn-add-product:hover { opacity: 0.8; }

    /* Cards Area */
    #prod-body {
      display: flex; flex: 1; overflow: hidden;
      flex-direction: column;
    }

    #prod-cards-wrap {
      padding: 14px 16px 10px;
      overflow-x: hidden; overflow-y: auto; flex-shrink: 0;
    }

    #prod-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
    }

    /* Product card */
    .prod-card {
      background: #1a1a1a; border: 1px solid #282828; border-radius: 8px;
      cursor: pointer; position: relative; overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
      display: flex; flex-direction: column;
    }
    .prod-card:hover { border-color: #383838; box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .prod-card.active { border-color: #f0a500; box-shadow: 0 0 0 1px #f0a50040; }
    .prod-card.featured { border-color: #f0a500; }
    .prod-card.featured:hover { box-shadow: 0 2px 16px rgba(240,165,0,0.15); }

    /* Top accent bar */
    .prod-card-bar { height: 3px; background: #383838; flex-shrink: 0; }
    .prod-card.featured .prod-card-bar { background: #f0a500; }

    .prod-card-inner { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 0; flex: 1; }

    /* Tag badge */
    .prod-tag {
      display: inline-flex; align-items: center;
      background: #222; border-radius: 3px;
      font-size: 9px; color: #686868; padding: 2px 7px;
      align-self: flex-start; margin-bottom: 10px; letter-spacing: 0.3px;
    }
    .prod-card.featured .prod-tag { background: #282010; color: #f0a500; }

    .prod-card-name {
      font-size: 15px; font-weight: 600; color: #e0e0e0;
      margin-bottom: 4px; line-height: 1.3;
    }
    .prod-card.featured .prod-card-name { color: #f0f0f0; }

    .prod-card-desc {
      font-size: 11px; color: #505050; margin-bottom: 12px; line-height: 1.4;
    }

    .prod-card-price {
      font-size: 22px; font-weight: 700; color: #c0c0c0;
      margin-bottom: 12px; line-height: 1;
    }
    .prod-card.featured .prod-card-price { color: #f0a500; }
    .prod-card-price-unit { font-size: 11px; color: #484848; font-weight: 400; margin-left: 3px; }

    .prod-card-perks { display: flex; flex-direction: column; gap: 6px; flex: 1; margin-bottom: 14px; }
    .prod-perk { font-size: 11px; color: #787878; display: flex; align-items: flex-start; gap: 5px; }
    .prod-perk::before { content: '✓'; color: #484848; flex-shrink: 0; font-size: 10px; margin-top: 1px; }

    /* Card buttons */
    .prod-card-actions { display: flex; gap: 8px; }
    .prod-card-actions button {
      flex: 1; height: 28px; border-radius: 5px; font-size: 11px;
      cursor: pointer; border: none; transition: all 0.15s;
    }
    .btn-view-scripts {
      background: #222; color: #909090;
    }
    .btn-view-scripts:hover { background: #2a2a2a; color: #d0d0d0; }
    .prod-card.featured .btn-view-scripts {

    }
    .prod-card.featured .btn-view-scripts:hover { opacity: 0.9; }
    .btn-edit-prod { background: #1a1a1a; color: #686868; border: 1px solid #252525 !important; }
    .btn-edit-prod:hover { background: #222; color: #999; }

    /* Add new card (dashed) */
    .prod-card-add {
      background: #141414; border: 1px dashed #222; border-radius: 8px;

    .prod-card-add .add-icon { font-size: 26px; color: #282828; }
    .prod-card-add .add-label { font-size: 12px; color: #303030; }

    /* Detail Panel */
    #prod-detail {

    #detail-header {

    #detail-body {

    #detail-left { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }

    }
    .core-point {

    }
    .core-point.highlight { background: #191600; border-color: #2a2200; }
    .core-point-text { font-size: 12px; color: #d0d0d0; margin-bottom: 4px; }
    .core-point-scene { font-size: 11px; color: #787878; }
    .core-point-scene::before { content: '→ '; }

    /* Right col: fit + stats */
    #detail-right { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; gap: 16px; }
    .fit-list { display: flex; flex-direction: column; gap: 6px; }
    .fit-item { font-size: 12px; color: #a0a0a0; display: flex; gap: 6px; }
    .fit-item::before { content: '·'; color: #555; flex-shrink: 0; }
    .worry-item { font-size: 11px; color: #787878; line-height: 1.5; }
    .worry-item strong { color: #a0a0a0; }

    /* Stats row */
    #detail-stats {
      border-top: 1px solid #252525;
      padding-top: 14px; margin-top: 4px;
      display: flex; gap: 20px; align-items: baseline; flex-wrap: wrap;
    }
    .stat-item { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 11px; color: #505050; }
    .stat-val { font-size: 14px; font-weight: 600; color: #d8d8d8; }
    .stat-val.gold { color: #f0a500; }

    /* Linked scripts tags */

    .scripts-label { font-size: 11px; color: #505050; }

    /* ── Edit Modal ── */

      background: rgba(0,0,0,0.65); z-index: 200;
      align-items: center; justify-content: center;

    #prod-modal {

/* ── Auth helper ── */
function resolveApiUrl(path) {
  const base = localStorage.getItem('gh2_api_base') || location.origin;
  return base.replace(/\/$/, '') + path;
}

function apiFetch(url, opts = {}) {
  const token = localStorage.getItem('gh2_token') || '';
  const headers = { ...(opts.headers || {}), 'Authorization': `Bearer ${token}` };
  return fetch(resolveApiUrl(url), { ...opts, headers }).then(r => {
    if (r.status === 401) {
      localStorage.removeItem('gh2_auth');
      localStorage.removeItem('gh2_token');
      try { window.parent.postMessage({ action: 'authExpired' }, '*'); } catch (err) {}
      throw new Error('unauthorized');
    }
    return r;
  });
}

      '1小时深度商业路径梳理',
      '专属行动方案文档',
      '可抵扣私教差价¥888'
    ],
    fit: [
      '有意向但没想清楚要做什么',
      '觉得私教太贵，想先试试',
      '老板/高收入客户，需要专业感'
    ],
    value: '1小时梳理清楚方向，输出专属行动方案',
    points: [
      { text: '一次把商业路径梳理清楚，值多少自己算', scene: '适合思路混乱、不知道从哪里开始的人' },
      { text: '¥888可抵扣私教，相当于提前锁定名额', scene: '适合觉得私教太贵、想先试试的客户' },
      { text: '不是聊天，是输出一份专属行动方案', scene: '适合老板型客户，需要成果交付感的人' }
    ],
    worries: [
      '一次咨询能有啥用 → 输出的是专属行动方案文档，不是聊天',
      '比私教便宜多了值得先试 → 对，而且¥888可以全额抵扣'
    ]
  }
];

/* ── Storage ── */
async function loadProductsFromServer() {
  try {
    const data = await apiFetch('/api/products').then(r => r.json());
    if (data && data.length) return data;
  } catch(e) {}
  return DEFAULT_PRODUCTS.map(p => ({ ...p }));
}

function saveProducts(prods) {
  apiFetch('/api/products', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(prods) });
}

/* ── State ── */
let products = [];
let activeProductId = null;
let editingId = null;
let searchQuery = '';

/* ── Render Cards ── */
function renderCards() {
  const grid = document.getElementById('prod-cards');
  grid.innerHTML = '';

  const filtered = products.filter(p =>
    !searchQuery ||
    p.name.includes(searchQuery) ||
    p.tag.includes(searchQuery) ||
    p.desc.includes(searchQuery)
  );

  filtered.forEach(p => {
    const card = document.createElement('div');
    card.className = 'prod-card' + (p.featured ? ' featured' : '') + (p.id === activeProductId ? ' active' : '');
    card.dataset.id = p.id;
    card.innerHTML = `
      <div class="prod-card-bar"></div>
      <div class="prod-card-inner">
        <span class="prod-tag">${p.tag}</span>
        <div class="prod-card-name">${esc(p.name)}</div>
        <div class="prod-card-desc">${esc(p.desc)}</div>
        <div class="prod-card-price">
          ${p.price ? '¥' + p.price.toLocaleString() : '<span style="font-size:13px;color:#444">—</span>'}
          ${p.price && p.priceUnit ? '<span class="prod-card-price-unit">' + esc(p.priceUnit) + '</span>' : ''}
        </div>
        <div class="prod-card-perks">
          ${p.perks.slice(0, 3).map(k => `<div class="prod-perk">${esc(k)}</div>`).join('')}
        </div>
        <div class="prod-card-actions">
          <button class="btn-view-scripts" onclick="viewScripts(${p.id}, event)">查看话术 →</button>
          <button class="btn-edit-prod" onclick="openModal(${p.id}, event)">✏️ 编辑</button>
        </div>
      </div>
    `;
    card.addEventListener('click', () => selectProduct(p.id));
    grid.appendChild(card);
  });

  // Add new card
  const addCard = document.createElement('div');
  addCard.className = 'prod-card-add';
  addCard.innerHTML = `<div class="add-icon">＋</div><div class="add-label">添加新产品</div>`;
  addCard.onclick = () => openModal(null);
  grid.appendChild(addCard);
}

/* ── Detail Panel ── */
function selectProduct(id) {
  activeProductId = id;
  renderCards();

  const p = products.find(x => x.id === id);
  if (!p) return;

  document.getElementById('detail-title').textContent = `📋 ${p.name} — 销售指南`;

  // Core points
  const pointsEl = document.getElementById('detail-points');
  pointsEl.innerHTML = p.points.map((pt, i) => `
    <div class="core-point ${i === 0 ? 'highlight' : ''}" style="margin-bottom:8px">
      <div class="core-point-text">① ${esc(pt.text)}</div>
      <div class="core-point-scene">${esc(pt.scene)}</div>
    </div>
  `.replace('①', `${['①','②','③'][i] || '·'}`)).join('');

  // Fit
  document.getElementById('detail-fit').innerHTML =
    p.fit.map(f => `<div class="fit-item">${esc(f)}</div>`).join('');

  // Worries
  document.getElementById('detail-worries').innerHTML =
    p.worries.length
      ? p.worries.map(w => {
          const parts = w.split(/→|→/);
          return `<div class="worry-item"><strong>${esc(parts[0].trim())}</strong>${parts[1] ? ' → ' + esc(parts[1].trim()) : ''}</div>`;
        }).join('')
      : '<div style="font-size:11px;color:#333">暂无</div>';

  // Stats (placeholder, no real data yet)
  document.getElementById('detail-stats').innerHTML = `
    <div class="stat-item"><span class="stat-label">本月成交</span><span class="stat-val">—</span></div>
    <div class="stat-item"><span class="stat-label">总流水</span><span class="stat-val gold">—</span></div>
    <div class="stat-item"><span class="stat-label">平均跟进天数</span><span class="stat-val">—</span></div>
  `;

  // Linked scripts (placeholder tags)
  document.getElementById('detail-scripts').innerHTML = `
    <span class="scripts-label">关联话术</span>
    <button class="script-tag" onclick="viewScripts(${p.id})">价格异议</button>
    <button class="script-tag" onclick="viewScripts(${p.id})">开场引入</button>
    <button class="script-tag" onclick="viewScripts(${p.id})">逼单收尾</button>
  `;

  document.getElementById('prod-detail').classList.add('visible');
}

function closeDetail() {
  activeProductId = null;
  document.getElementById('prod-detail').classList.remove('visible');
  renderCards();
}

/* ── View Scripts (switch tab) ── */
function viewScripts(id, e) {
  if (e) e.stopPropagation();
  // Signal parent iframe shell to switch to scripts tab
  try { parent.postMessage({ type: 'switchTab', tab: 'scripts' }, '*'); } catch(err) {}
}

/* ── Edit Modal ── */
function openModal(id, e) {
  if (e) e.stopPropagation();
  editingId = id;

  const p = id ? products.find(x => x.id === id) : null;
  document.getElementById('modal-title').textContent = p ? '编辑产品' : '添加产品';
  document.getElementById('modal-delete-btn').style.display = p ? 'block' : 'none';

  document.getElementById('m-name').value = p ? p.name : '';
  document.getElementById('m-tag').value = p ? p.tag : '';
  document.getElementById('m-desc').value = p ? p.desc : '';
  document.getElementById('m-price').value = p && p.price ? p.price : '';
  document.getElementById('m-price-unit').value = p ? p.priceUnit : '';
  document.getElementById('m-perks').value = p ? p.perks.join('\n') : '';
  document.getElementById('m-fit').value = p ? p.fit.join('\n') : '';
  document.getElementById('m-value').value = p ? p.value : '';
  document.getElementById('m-points').value = p
    ? p.points.map(pt => pt.text + ' | ' + pt.scene).join('\n')
    : '';
  document.getElementById('m-worries').value = p ? p.worries.join('\n') : '';
  document.getElementById('m-featured').value = p && p.featured ? '1' : '0';

  document.getElementById('prod-modal-overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('prod-modal-overlay').classList.remove('open');
  editingId = null;
}

function saveProduct() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) { alert('产品名称不能为空'); return; }

  const priceRaw = document.getElementById('m-price').value.trim();
  const pointsRaw = document.getElementById('m-points').value.trim();

  const prod = {
    id: editingId || Date.now(),
    name,
    tag: document.getElementById('m-tag').value.trim() || '其他',
    desc: document.getElementById('m-desc').value.trim(),
    price: priceRaw ? parseFloat(priceRaw) : null,
    priceUnit: document.getElementById('m-price-unit').value.trim(),
    featured: document.getElementById('m-featured').value === '1',
    perks: document.getElementById('m-perks').value.split('\n').map(s => s.trim()).filter(Boolean).slice(0, 3),
    fit: document.getElementById('m-fit').value.split('\n').map(s => s.trim()).filter(Boolean),
    value: document.getElementById('m-value').value.trim(),
    points: pointsRaw ? pointsRaw.split('\n').map(line => {
      const [text, scene] = line.split('|').map(s => s.trim());
      return { text: text || '', scene: scene || '' };
    }).filter(p => p.text) : [],
    worries: document.getElementById('m-worries').value.split('\n').map(s => s.trim()).filter(Boolean)
  };

  if (editingId) {
    const idx = products.findIndex(x => x.id === editingId);
    if (idx >= 0) products[idx] = prod;
  } else {
    products.push(prod);
  }

  saveProducts(products);
  closeModal();
  renderCards();

  if (activeProductId === editingId) selectProduct(editingId);
}

function deleteProduct() {
  if (!editingId) return;
  if (!confirm('确定删除这个产品？')) return;
  products = products.filter(p => p.id !== editingId);
  saveProducts(products);
  if (activeProductId === editingId) closeDetail();
  closeModal();
  renderCards();
}

/* ── Search ── */
document.getElementById('prod-search').addEventListener('input', function() {
  searchQuery = this.value.trim();
  renderCards();
});

/* ── AI Integration: expose product card for prompt injection ── */
window.getProductCard = function(name) {
  const p = products.find(x => x.name === name || x.name.includes(name));
  if (!p) return null;
  return [
    `【产品卡：${p.name}】`,
    p.price ? `价格：¥${p.price}${p.priceUnit}` : '',
    `核心价值：${p.value}`,
    `适合谁：${p.fit.join('、')}`,
    `权益：${p.perks.join('；')}`,
    p.points.length ? `核心卖点：\n${p.points.map((pt, i) => `${i+1}. ${pt.text}（${pt.scene}）`).join('\n')}` : '',
    p.worries.length ? `常见顾虑：\n${p.worries.map(w => '· ' + w).join('\n')}` : ''
  ].filter(Boolean).join('\n');
};

window.getAllProducts = function() {
  return products;
};

/* ── Utils ── */
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Init ── */
(async () => {
  products = await loadProductsFromServer();
  // 如果服务器没有数据，把默认数据保存上去
  if (!products.length) {
    products = DEFAULT_PRODUCTS.map(p => ({ ...p }));
    saveProducts(products);
  }
  renderCards();
})();

// Close modal on overlay click
document.getElementById('prod-modal-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
